---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://ghcr.io/home-operations/charts-mirror/cilium
    version: 1.18.6
    values:
      - ./templates/values.yaml.gotmpl
    disableValidation: true
    hooks:
      - command: bash
        args:
          - -c
          - until kubectl get crd ciliumloadbalancerippools.cilium.io ciliumbgpadvertisements.cilium.io ciliumbgppeerconfigs.cilium.io ciliumbgpclusterconfigs.cilium.io &>/dev/null; do sleep 5; done
        events:
          - postsync
        showlogs: true
      - command: kubectl
        args:
          - apply
          - --namespace=kube-system
          - --server-side
          - --field-manager=kustomize-controller
          - --filename=../../kubernetes/apps/kube-system/cilium/app/network.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.45.2
    values:
      - ./templates/values.yaml.gotmpl
    disableValidation: true
    needs:
      - kube-system/cilium

  # - name: spegel
  #   namespace: kube-system
  #   chart: oci://ghcr.io/spegel-org/helm-charts/spegel
  #   version: 0.6.0
  #   values:
  #     - ./templates/values.yaml.gotmpl
  #   disableValidation: true
  #   needs:
  #     - kube-system/coredns

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.0
    values:
      - ./templates/values.yaml.gotmpl
    disableValidation: true
    needs:
      - kube-system/coredns

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.1.0
    values:
      - ./templates/values.yaml.gotmpl
    disableValidation: true
    needs:
      - cert-manager/cert-manager
    hooks:
      - events:
          - "postsync"
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            until kubectl get crd issuers.cert-manager.io certificates.cert-manager.io &>/dev/null; do sleep 5; done
            kubectl apply --server-side --field-manager=bootstrap --kustomize ../../kubernetes/apps/external-secrets/external-secrets/bitwarden
            until kubectl get crd clustersecretstores.external-secrets.io &>/dev/null; do sleep 5; done

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.45.1
    values:
      - ./templates/values.yaml.gotmpl
    disableValidation: true
    needs:
      - external-secrets/external-secrets

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.45.1
    needs:
      - flux-system/flux-operator
    hooks:
      - events:
          - postsync
        showlogs: true
        command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=bootstrap
          - --force-conflicts
          - -f
          - ../../kubernetes/apps/flux-system/flux-instance/app/flux-instance.yaml

