---
customization:
  extraKernelArgs:
    - -lockdown
    - lockdown=integrity
    - mitigations=off
    - split_lock_detect=off
    - security=none
    - apparmor=0
    - -selinux
    - talos.auditd.disabled=1
    - init_on_alloc=0
    - init_on_free=0
    - -init_on_alloc
    - -init_on_free
  systemExtensions:
    officialExtensions:
      - siderolabs/i915
      - siderolabs/intel-ucode
      - siderolabs/mei
      - siderolabs/nfsrahead
      - siderolabs/util-linux-tools
