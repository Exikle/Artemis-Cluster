---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Labeler

on:
  pull_request_target:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        run: pip install pyyaml --break-system-packages

      - name: Apply Labels
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          FORGEJO_API_URL: ${{ forgejo.api_url }}
          FORGEJO_REPOSITORY: ${{ forgejo.repository }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
        run: |-
          python3 - <<'EOF'
          import fnmatch, json, os, sys, yaml
          import urllib.request, urllib.error

          api_url = os.environ['FORGEJO_API_URL']
          repo    = os.environ['FORGEJO_REPOSITORY']
          token   = os.environ['CI_TOKEN']
          pr_num  = os.environ['PR_NUMBER']

          headers = {
              'Authorization': f'token {token}',
              'Content-Type': 'application/json',
          }

          def api(method, path, data=None):
              url  = f'{api_url}/repos/{repo}/{path}'
              body = json.dumps(data).encode() if data else None
              req  = urllib.request.Request(url, data=body, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f'ERROR {method} {url}: {e.code} {e.read().decode()}', file=sys.stderr)
                  sys.exit(1)

          def glob_match(filename, pattern):
              if '**' not in pattern:
                  return fnmatch.fnmatch(filename, pattern)
              prefix = pattern[:pattern.index('**')].rstrip('/')
              return filename.startswith(prefix + '/') if prefix else True

          files_resp = api('GET', f'pulls/{pr_num}/files?limit=50')
          changed = [f['filename'] for f in files_resp]

          with open('.forgejo/labeler.yaml') as f:
              config = yaml.safe_load(f)

          labels_to_add = set()
          for label, rules in config.items():
              for rule in rules:
                  for pattern_group in rule.get('changed-files', []):
                      globs = pattern_group.get('any-glob-to-any-file', [])
                      if isinstance(globs, str):
                          globs = [globs]
                      if any(glob_match(f, g) for f in changed for g in globs):
                          labels_to_add.add(label)
                          break

          if not labels_to_add:
              print('No labels to apply')
              sys.exit(0)

          all_labels = api('GET', 'labels')
          label_map = {l['name']: l['id'] for l in all_labels}
          ids_to_add = [label_map[name] for name in labels_to_add if name in label_map]

          if not ids_to_add:
              print('No matching labels found in repo — run labels-sync first')
              sys.exit(0)

          print(f'Applying labels: {sorted(labels_to_add)}')
          api('POST', f'issues/{pr_num}/labels', {'labels': ids_to_add})
          EOF
