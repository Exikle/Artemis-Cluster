---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flux Local

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flux Local - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Local - Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install flux-local
        run: pip install flux-local==8.2.0 --break-system-packages

      - name: Run flux-local test
        run: |-
          flux-local test \
            --all-namespaces \
            --enable-helm \
            --path kubernetes/flux/sync \
            --sources "flux-system=." \
            --verbose

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Local - Diff ${{ matrix.resource }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: default
          persist-credentials: false
          ref: ${{ forgejo.event.repository.default_branch }}

      - name: Install flux-local
        run: pip install flux-local==8.2.0 --break-system-packages

      - name: Run flux-local diff
        working-directory: pull
        run: |-
          flux-local diff ${{ matrix.resource }} \
            --unified 6 \
            --path kubernetes/flux/sync \
            --path-orig ../default/kubernetes/flux/sync \
            --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart,caBundle" \
            --limit-bytes 10000 \
            --all-namespaces \
            --sources "flux-system=." \
            --sources "flux-system=../default" \
            --output-file diff.patch

      - name: Generate Diff
        id: diff
        run: |
          {
            echo 'diff<<EOF'
            cat pull/diff.patch
            echo EOF
          } >> "${FORGEJO_OUTPUT}"
          {
            echo "## Flux ${{ matrix.resource }} diff"
            echo '```diff'
            cat pull/diff.patch
            echo '```'
          } >> "${FORGEJO_STEP_SUMMARY}"

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          HEADER: "${{ forgejo.event.pull_request.number }}/kubernetes/${{ matrix.resource }}"
        run: |-
          MARKER="<!-- sticky-comment: ${HEADER} -->"
          BODY_JSON=$(jq -Rs --arg marker "${MARKER}" \
            '{"body": ($marker + "\n```diff\n" + . + "\n```")}' < pull/diff.patch)

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${CI_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" \
              '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${CI_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${CI_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs:
      - test
      - diff
    name: Flux Local - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"

      - name: Post commit status
        if: ${{ always() }}
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          SHA: ${{ forgejo.event.pull_request.head.sha || forgejo.sha }}
          STATE: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
        run: |-
          curl -s -X POST \
            -H "Authorization: token ${CI_TOKEN}" \
            -H "Content-Type: application/json" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/statuses/${SHA}" \
            -d "{\"context\": \"Flux Local - Success\", \"state\": \"${STATE}\", \"description\": \"Flux local test and diff\"}"
