---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Labels Sync

on:
  push:
    branches:
      - main
    paths:
      - .forgejo/labels.yaml
  workflow_dispatch:

jobs:
  sync:
    name: Labels Sync
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: .forgejo/labels.yaml
          sparse-checkout-cone-mode: false

      - name: Sync Labels
        uses: https://github.com/EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2.3.3
        with:
          config-file: .forgejo/labels.yaml
          delete-other-labels: true
