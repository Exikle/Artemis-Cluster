---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Labels Sync

on:
  push:
    branches:
      - main
    paths:
      - .forgejo/labels.yaml
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

jobs:
  sync:
    name: Labels Sync
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: .forgejo/labels.yaml
          sparse-checkout-cone-mode: false

      - name: Sync Labels
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
        run: |-
          set -euo pipefail
          API="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${CI_TOKEN}"

          EXISTING=$(curl -sfSL -H "${AUTH}" "${API}/labels?limit=100")

          # Create or update each label from the yaml file
          while IFS=$'\t' read -r name color desc; do
            color="#${color}"
            ID=$(echo "${EXISTING}" | jq -r --arg n "${name}" '.[] | select(.name == $n) | .id')
            PAYLOAD=$(jq -n --arg name "${name}" --arg color "${color}" --arg desc "${desc}" \
              '{name: $name, color: $color, description: $desc}')
            if [[ -n "${ID}" ]]; then
              curl -sfSL -X PATCH -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/labels/${ID}" -d "${PAYLOAD}" > /dev/null
              echo "Updated: ${name}"
            else
              curl -sfSL -X POST -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/labels" -d "${PAYLOAD}" > /dev/null
              echo "Created: ${name}"
            fi
          done < <(yq -r '.[] | [.name, .color, (.description // "")] | @tsv' .forgejo/labels.yaml)

          # Delete labels not present in the yaml file
          YAML_NAMES=$(yq -r '.[].name' .forgejo/labels.yaml)
          while IFS=$'\t' read -r id name; do
            if ! echo "${YAML_NAMES}" | grep -qxF "${name}"; then
              curl -sfSL -X DELETE -H "${AUTH}" "${API}/labels/${id}" > /dev/null
              echo "Deleted: ${name}"
            fi
          done < <(echo "${EXISTING}" | jq -r '.[] | [.id, .name] | @tsv')

          echo "Sync complete"
