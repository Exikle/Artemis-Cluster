---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Test ${{ matrix.kind }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: default
          persist-credentials: false
          ref: ${{ forgejo.event.repository.default_branch }}

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@0ac5ffe07afe5814c3f495d913364a4ef56f93b4 # main
        with:
          version: 0.1.13

      - name: Run flate test
        run: flate test ${{ matrix.kind }} --path ./pull --path-orig ./default

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Diff ${{ matrix.kind }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: default
          persist-credentials: false
          ref: ${{ forgejo.event.repository.default_branch }}

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@0ac5ffe07afe5814c3f495d913364a4ef56f93b4 # main
        with:
          version: 0.1.13

      - name: Run flate diff
        id: diff
        env:
          KIND: ${{ matrix.kind }}
        run: |
          {
            echo 'diff<<EOF'
            flate diff "${KIND}" --path ./pull --path-orig ./default
            echo 'EOF'
          } >> "${FORGEJO_OUTPUT}"

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.DUSK_BOT_PAT }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          HEADER: "${{ forgejo.event.pull_request.number }}/kubernetes/${{ matrix.kind }}"
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
        run: |-
          MARKER="<!-- sticky-comment: ${HEADER} -->"
          BODY=$(printf $'%s\n```diff\n%s\n```' "${MARKER}" "${DIFF_CONTENT}")
          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi
