---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - kubernetes/**

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    if: ${{ forgejo.event_name == 'pull_request' }}
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ forgejo.event_name == 'pull_request' && needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate (${{ matrix.kind }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@39f44bd8bc9f11ba5321cecbdfc04398a568f4d0 # v0.3.3
        with:
          token: ""
          cache: "true"

      - name: Run flate test
        run: flate test ${{ matrix.kind }} --path ./kubernetes/flux/sync --base ${{ forgejo.event.repository.default_branch }} # zizmor: ignore[template-injection]

      - name: Run flate diff
        id: diff
        run: |-
          {
            echo 'diff<<EOF'
            flate diff ${{ matrix.kind }} --path ./kubernetes/flux/sync --output gitea
            echo 'EOF'
          } >> "${FORGEJO_OUTPUT}"

      - name: Load Cluster Secrets
        id: secrets
        if: ${{ steps.diff.outputs.diff != '' }}
        uses: ./.forgejo/actions/load-cluster-secrets
        with:
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Post PR Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        uses: ./.forgejo/actions/post-pr-comment
        with:
          token: ${{ steps.secrets.outputs.token }}
          pr-number: ${{ forgejo.event.pull_request.number }}
          kind: ${{ matrix.kind }}
          diff: ${{ steps.diff.outputs.diff }}
          run-url: "${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
          api-url: ${{ forgejo.api_url }}
          repository: ${{ forgejo.repository }}

  success:
    if: ${{ forgejo.event_name == 'pull_request' && !cancelled() }}
    needs:
      - flate
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: .forgejo/actions
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Load Cluster Secrets
        id: secrets
        uses: ./.forgejo/actions/load-cluster-secrets
        with:
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Set Commit Status
        uses: ./.forgejo/actions/set-commit-status
        with:
          token: ${{ steps.secrets.outputs.token }}
          sha: ${{ forgejo.event.pull_request.head.sha }}
          state: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          context: "Flate - Success"
          description: "Flate checks ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}"
          api-url: ${{ forgejo.api_url }}
          repository: ${{ forgejo.repository }}

      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

  warm:
    if: ${{ forgejo.event_name == 'push' }}
    name: Flate - Warm Cache (${{ matrix.kind }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@39f44bd8bc9f11ba5321cecbdfc04398a568f4d0 # v0.3.3
        with:
          token: ""
          cache: "true"

      - name: Run flate test
        run: flate test ${{ matrix.kind }} --path ./kubernetes/flux/sync --base HEAD~1
        continue-on-error: true
