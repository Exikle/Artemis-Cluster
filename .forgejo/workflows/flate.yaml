---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate (${{ matrix.kind }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # - name: Setup Mise
      #   uses: https://github.com/jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      #   with:
      #     cache: false
      #     tool_versions: |
      #       github:home-operations/flate latest

      - name: Install flate
        run: |
          # renovate: datasource=github-releases depName=home-operations/flate
          curl -fsSL "https://github.com/home-operations/flate/releases/download/0.1.21/flate_0.1.21_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin flate

      - name: Run flate test
        env:
          KIND: ${{ matrix.kind }}
        run: flate test "$KIND" --path ./kubernetes

      - name: Run flate diff
        env:
          KIND: ${{ matrix.kind }}
        run: |
          flate diff "$KIND" --path ./kubernetes > "$KIND.diff"
          [ -s "$KIND.diff" ] || rm "$KIND.diff"

      - if: ${{ hashFiles(format('{0}.diff', matrix.kind)) != '' }}
        name: Upload diff
        uses: https://github.com/actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: flate-diff-${{ matrix.kind }}
          path: ${{ matrix.kind }}.diff
          retention-days: 1

  comment:
    if: ${{ !cancelled() && needs.flate.result != 'skipped' }}
    needs: flate
    name: Flate - Comment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download diffs
        uses: https://github.com/actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a # v3
        with:
          pattern: flate-diff-*

      - if: ${{ hashFiles('flate-diff-helmrelease/helmrelease.diff', 'flate-diff-kustomization/kustomization.diff') != '' }}
        name: Load Secrets
        id: load-secrets
        uses: https://github.com/1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DUSK_BOT_PAT: op://kubernetes/forgejo/DUSK_BOT_PAT
          DUSK_BOT_GPG_PRIVATE_KEY: op://kubernetes/forgejo/DUSK_BOT_GPG_PRIVATE_KEY

      - if: ${{ hashFiles('flate-diff-helmrelease/helmrelease.diff', 'flate-diff-kustomization/kustomization.diff') != '' }}
        name: Add or Update Comment
        env:
          GH_TOKEN: ${{ steps.load-secrets.outputs.DUSK_BOT_PAT }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          RUN_URL: "${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
        run: |-
          MARKER="<!-- Sticky Pull Request Comment${PR_NUMBER}/kubernetes/flate -->"
          FENCE='```'
          BUDGET=60000
          BODY="${MARKER}"

          for KIND in helmrelease kustomization; do
            LABEL=$([ "${KIND}" = "helmrelease" ] && echo "HelmRelease" || echo "Kustomization")
            DIFF=$([ -f "flate-diff-${KIND}/${KIND}.diff" ] && cat "flate-diff-${KIND}/${KIND}.diff" || echo "")
            if [[ -n "${DIFF}" ]]; then
              if [[ ${#DIFF} -gt $((BUDGET / 2)) ]]; then
                BODY=$(printf '%s\n<details><summary>%s diff (%s chars — too large to post)</summary>\n\nDiff exceeds comment size limit. Download the artifact from the [workflow run](%s).\n\n</details>' \
                  "${BODY}" "${LABEL}" "${#DIFF}" "${RUN_URL}")
              else
                BODY=$(printf '%s\n<details open><summary>%s diff</summary>\n\n%sdiff\n%s\n%s\n\n</details>' \
                  "${BODY}" "${LABEL}" "${FENCE}" "${DIFF}" "${FENCE}")
              fi
            fi
          done

          BODY=$(printf '%s\n\n<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](%s)</sub>' \
            "${BODY}" "${RUN_URL}")
          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" \
              '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs:
      - flate
      - comment
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
