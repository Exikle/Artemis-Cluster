---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate (${{ matrix.kind }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@ff3803f19b3e933da5a90085e275def2d89ef17e # 0.2.6
        with:
          token: ""

      - name: Run flate test
        run: flate test ${{ matrix.kind }} --path ./kubernetes/flux/sync --base ${{ forgejo.event.repository.default_branch }}

      - name: Run flate diff
        env:
          KIND: ${{ matrix.kind }}
        run: |
          flate diff "$KIND" --path ./kubernetes/flux/sync --output github > "$KIND.diff"
          [ -s "$KIND.diff" ] || rm "$KIND.diff"

      - if: ${{ hashFiles(format('{0}.diff', matrix.kind)) != '' }}
        name: Upload diff
        uses: https://github.com/actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: flate-diff-${{ matrix.kind }}
          path: ${{ matrix.kind }}.diff
          retention-days: 1

  comment:
    if: ${{ !cancelled() && needs.flate.result != 'skipped' }}
    needs: flate
    name: Flate - Comment
    runs-on: ubuntu-latest
    steps:
      - name: Download helmrelease diff
        continue-on-error: true
        uses: https://github.com/actions/download-artifact@a9bc5e6ef2cb54c177f32aa5726adaa15e7e2d59 # v3.1.0
        with:
          name: flate-diff-helmrelease

      - name: Download kustomization diff
        continue-on-error: true
        uses: https://github.com/actions/download-artifact@a9bc5e6ef2cb54c177f32aa5726adaa15e7e2d59 # v3.1.0
        with:
          name: flate-diff-kustomization

      - if: ${{ hashFiles('helmrelease.diff', 'kustomization.diff') != '' }}
        name: Load Secrets
        id: load-secrets
        uses: https://github.com/1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DUSK_BOT_PAT: op://kubernetes/forgejo/DUSK_BOT_PAT

      - if: ${{ hashFiles('helmrelease.diff', 'kustomization.diff') != '' }}
        name: Add or Update Comment
        env:
          GH_TOKEN: ${{ steps.load-secrets.outputs.DUSK_BOT_PAT }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          RUN_URL: "${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
        run: |-
          MARKER="<!-- flate -->"
          FENCE='```'
          BODY="${MARKER}"

          for KIND in kustomization helmrelease; do
            DIFF_FILE="${KIND}.diff"
            if [[ -f "${DIFF_FILE}" ]]; then
              LABEL=$([ "${KIND}" = "helmrelease" ] && echo "HelmRelease" || echo "Kustomization")
              DIFF_CONTENT=$(cat "${DIFF_FILE}")
              BODY+=$(printf '\n<details open><summary>%s diff</summary>\n\n%sdiff\n%s\n%s\n\n</details>' \
                "${LABEL}" "${FENCE}" "${DIFF_CONTENT}" "${FENCE}")
            fi
          done

          BODY+=$(printf '\n\n<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](%s)</sub>' "${RUN_URL}")
          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs:
      - flate
      - comment
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: https://github.com/1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DUSK_BOT_PAT: op://kubernetes/forgejo/DUSK_BOT_PAT

      - name: Set commit status
        env:
          GH_TOKEN: ${{ steps.load-secrets.outputs.DUSK_BOT_PAT }}
          SHA: ${{ forgejo.event.pull_request.head.sha }}
          STATE: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
        run: |
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/statuses/${SHA}" \
            -d "{\"state\": \"${STATE}\", \"context\": \"Flate - Success\", \"description\": \"Flate checks ${STATE}\"}"

      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
