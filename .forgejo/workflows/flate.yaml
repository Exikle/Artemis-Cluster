---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: default
          persist-credentials: false

      - name: Setup Mise
        uses: https://github.com/jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          github_token: ${{ secrets.GH_PAT }}
          tool_versions: |
            github:home-operations/flate latest

      - name: Run flate test
        run: flate test ${{ matrix.resource }} --allow-missing-secrets --path ./pull --path-orig ./default

      - name: Run flate diff
        id: diff
        run: |-
          {
            echo 'diff<<EOF'
            flate diff ${{ matrix.resource }} --allow-missing-secrets --path ./pull --path-orig ./default
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          DIFF: ${{ steps.diff.outputs.diff }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEADER: "${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}"
        run: |-
          MARKER="<!-- sticky-comment: ${HEADER} -->"
          BODY_JSON=$(jq -n --arg marker "${MARKER}" --arg diff "${DIFF}" \
            '{"body": ($marker + "\n```diff\n" + $diff + "\n```")}')

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${CI_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" \
              '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${CI_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${CI_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs: flate
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
