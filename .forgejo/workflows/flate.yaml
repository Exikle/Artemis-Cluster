---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache flate artifacts
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/flate
          key: flate-${{ runner.os }}-${{ hashFiles('kubernetes/**') }}
          restore-keys: |
            flate-${{ runner.os }}-

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@dead45661b4ba1bec3fd47c3ca5ce43c7cccdc6b # v0.4.2
        with:
          token: ""

      - name: Test
        run: flate test all --path ./kubernetes/flux/sync --base ${{ forgejo.event.repository.default_branch }} # zizmor: ignore[template-injection]

      - name: Diff / HelmRelease
        id: diff-helmrelease
        run: |-
          {
            echo 'diff<<EOF'
            flate diff helmrelease --path ./kubernetes/flux/sync --output gitea
            echo 'EOF'
          } >> "${FORGEJO_OUTPUT}"

      - name: Diff / Kustomization
        id: diff-kustomization
        run: |-
          {
            echo 'diff<<EOF'
            flate diff kustomization --path ./kubernetes/flux/sync --output gitea
            echo 'EOF'
          } >> "${FORGEJO_OUTPUT}"

      - name: Comment / HelmRelease
        if: ${{ steps.diff-helmrelease.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.CI_TOKEN }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          DIFF_CONTENT: ${{ steps.diff-helmrelease.outputs.diff }}
          RUN_URL: "${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
        run: |- # zizmor: ignore[template-injection]
          MARKER="<!-- flate-helmrelease -->"
          FENCE='```'
          BODY=$(printf '%s\n<details open><summary>helmrelease diff</summary>\n\n%sdiff\n%s\n%s\n\n</details>\n\n<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](%s)</sub>' \
            "${MARKER}" "${FENCE}" "${DIFF_CONTENT}" "${FENCE}" "${RUN_URL}")
          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

      - name: Comment / Kustomization
        if: ${{ steps.diff-kustomization.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.CI_TOKEN }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          DIFF_CONTENT: ${{ steps.diff-kustomization.outputs.diff }}
          RUN_URL: "${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
        run: |- # zizmor: ignore[template-injection]
          MARKER="<!-- flate-kustomization -->"
          FENCE='```'
          BODY=$(printf '%s\n<details open><summary>kustomization diff</summary>\n\n%sdiff\n%s\n%s\n\n</details>\n\n<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](%s)</sub>' \
            "${MARKER}" "${FENCE}" "${DIFF_CONTENT}" "${FENCE}" "${RUN_URL}")
          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs:
      - flate
    name: Success
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status
        env:
          GH_TOKEN: ${{ secrets.CI_TOKEN }}
          SHA: ${{ forgejo.event.pull_request.head.sha }}
          STATE: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
        run: | # zizmor: ignore[template-injection]
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/statuses/${SHA}" \
            -d "{\"state\": \"${STATE}\", \"context\": \"Flate - Success\", \"description\": \"Flate checks ${STATE}\"}"

      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
