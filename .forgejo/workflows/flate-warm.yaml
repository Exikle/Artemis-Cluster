---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate - Warm Cache

on:
  push:
    branches:
      - main
    paths:
      - kubernetes/**

permissions:
  contents: read

jobs:
  warm:
    name: Flate - Warm Cache (${{ matrix.kind }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@2e60db3b5de50864088cf597c2ca801dc274793b # v0.3.2
        with:
          token: ""
          cache: "true"

      - name: Run flate test
        run: flate test ${{ matrix.kind }} --path ./kubernetes/flux/sync --base HEAD~1
        continue-on-error: true
