---
name: Set Commit Status
description: POST a commit status to Forgejo

inputs:
  token:
    description: Forgejo API token
    required: true
  sha:
    description: Commit SHA
    required: true
  state:
    description: Status state (success, failure, pending, error)
    required: true
  context:
    description: Status context name
    required: true
  description:
    description: Status description
    required: false
    default: ""
  api-url:
    description: Forgejo API URL
    required: true
  repository:
    description: Repository in owner/name format
    required: true

runs:
  using: composite
  steps:
    - name: Set status
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        SHA: ${{ inputs.sha }}
        STATE: ${{ inputs.state }}
        CONTEXT: ${{ inputs.context }}
        DESCRIPTION: ${{ inputs.description }}
        API_URL: ${{ inputs.api-url }}
        REPOSITORY: ${{ inputs.repository }}
      run: |-
        curl -s -X POST \
          -H "Authorization: token ${TOKEN}" \
          -H "Content-Type: application/json" \
          "${API_URL}/repos/${REPOSITORY}/statuses/${SHA}" \
          -d "{\"state\": \"${STATE}\", \"context\": \"${CONTEXT}\", \"description\": \"${DESCRIPTION}\"}"
