---
name: Post PR Comment
description: Create or update a sticky flate diff comment on a pull request

inputs:
  token:
    description: Forgejo API token
    required: true
  pr-number:
    description: Pull request number
    required: true
  kind:
    description: Diff kind label (helmrelease or kustomization)
    required: true
  diff:
    description: Diff content to embed in the comment
    required: true
  run-url:
    description: URL of the workflow run
    required: true
  api-url:
    description: Forgejo API URL
    required: true
  repository:
    description: Repository in owner/name format
    required: true

runs:
  using: composite
  steps:
    - name: Post or update comment
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        KIND: ${{ inputs.kind }}
        DIFF_CONTENT: ${{ inputs.diff }}
        RUN_URL: ${{ inputs.run-url }}
        API_URL: ${{ inputs.api-url }}
        REPOSITORY: ${{ inputs.repository }}
      run: |-
        MARKER="<!-- flate-${KIND} -->"
        FENCE='```'
        BODY=$(printf '%s\n<details open><summary>%s diff</summary>\n\n%sdiff\n%s\n%s\n\n</details>\n\n<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](%s)</sub>' \
          "${MARKER}" "${KIND}" "${FENCE}" "${DIFF_CONTENT}" "${FENCE}" "${RUN_URL}")
        BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

        COMMENT_ID=$(curl -s \
          -H "Authorization: token ${TOKEN}" \
          "${API_URL}/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
          | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

        if [[ -n "${COMMENT_ID}" ]]; then
          curl -s -X PATCH \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_URL}/repos/${REPOSITORY}/issues/comments/${COMMENT_ID}" \
            -d "${BODY_JSON}"
        else
          curl -s -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_URL}/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "${BODY_JSON}"
        fi
