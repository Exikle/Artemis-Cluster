---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${APP}
spec:
  behavior:
    scaleDown:
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max
      stabilizationWindowSeconds: 0
    scaleUp:
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max
      stabilizationWindowSeconds: 0
  maxReplicas: 1
  metrics:
    - type: External
      external:
        metric:
          name: ${ZEROSCALER_METRIC_NAME:=probe_success}
          selector:
            matchLabels:
              job: ${ZEROSCALER_JOB_NAME:=blackbox-tcp}
        target:
          type: Value
          value: "1"
  minReplicas: 0
  scaleTargetRef:
    apiVersion: apps/v1
    kind: ${CONTROLLER:=Deployment}
    name: ${APP}
