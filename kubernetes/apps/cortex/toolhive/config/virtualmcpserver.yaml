---
# General gateway — safe for any AI session (Open WebUI default)
# URL: http://vmcp-artemis-general.cortex.svc.cluster.local:4483
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: artemis-general
spec:
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
    operational:
      failureHandling:
        healthCheckInterval: 30s
        partialFailureMode: continue
  groupRef:
    name: artemis-general
  incomingAuth:
    type: anonymous
    authzConfig:
      type: inline
      inline:
        policies:
          - "permit(principal, action, resource);"
  outgoingAuth:
    source: discovered
  telemetryConfigRef:
    name: prometheus

