# MCP servers: mcp-grafana (observability), mcp-searxng (web search)
# mem0 MCP: http://mem0.cortex.svc.cluster.local:8765/mcp/{client}/sse/{user_id}
#            (built into openmemory-mcp, not a ToolHive-managed MCPServer)
# External URL: https://mcp-general.dcunha.io (internal-gateway / LAN only)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: artemis-general
spec:
  description: "Safe tools for all AI sessions — search, observability. Clients: Open WebUI, n8n, Claude Code."

