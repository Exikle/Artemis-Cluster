---
# MCP gateway routes — internal-gateway only (LAN access)
# artemis-general: Open WebUI tools, Claude Code (search + memory + observability)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmcp-artemis-general
  namespace: cortex
  annotations:
    gatus.home-operations.com/endpoint: |-
      url: https://mcp-general.dcunha.io/health
      conditions: ["[STATUS] == 200"]
      group: internal
spec:
  hostnames:
    - "mcp-general.dcunha.io"
  parentRefs:
    - name: internal-gateway
      namespace: network
  rules:
    - timeouts:
        request: "0s"
      backendRefs:
        - name: vmcp-artemis-general
          port: 4483

