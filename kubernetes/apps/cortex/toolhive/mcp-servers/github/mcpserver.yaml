---
# Source: https://github.com/github/github-mcp-server (official GitHub MCP server)
# Adapted from: https://raw.githubusercontent.com/stacklok/toolhive/main/examples/operator/mcp-servers/mcpserver_github.yaml
# Changes: namespace ai, secret ref updated to github-mcp-secret (ESO-managed)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-github
spec:
  env:
    - name: GITHUB_API_URL
      value: https://api.github.com
    - name: LOG_LEVEL
      value: info
  groupRef:
    name: artemis-ops
  image: ghcr.io/github/github-mcp-server:v1.1.2
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  secrets:
    - name: github-mcp
      key: GITHUB_PERSONAL_ACCESS_TOKEN
      targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
  transport: stdio
