---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# 1Password item: "grafana-mcp" in kubernetes vault
# Required field: GRAFANA_SERVICE_ACCOUNT_TOKEN
# Create in Grafana: Administration → Service Accounts → Add service account token
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname grafana-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: "{{ .GRAFANA_SERVICE_ACCOUNT_TOKEN }}"
  dataFrom:
    - extract:
        key: grafana
