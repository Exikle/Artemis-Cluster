---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 30m
  values:
    fullnameOverride: memini
    controllers:
      main:
        containers:
          main:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: MEMINI_API_KEY
              MEMINI_EMBED_BASE_URL: http://text-embeddings-inference.cortex.svc.cluster.local:8080/v1
              MEMINI_EMBED_DIMS: "384"
              MEMINI_EMBED_MODEL: all-MiniLM-L6-v2
              MEMINI_LLM_BASE_URL: http://ollama.external-endpoints.svc.cluster.local:11434/v1
              MEMINI_LLM_MODEL: llama3.1:8b
              MEMINI_RERANK: http://text-reranker-inference.cortex.svc.cluster.local:8080
              MEMINI_RERANK_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
              MEMINI_MERGE_HINT_MIN_SCORE: "0.95"
              MEMINI_WRITE_DEDUP_MIN_SCORE: "0.9"
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    grafanaDashboards:
      enabled: true
    persistence:
      data:
        storageClass: ceph-block
        size: 5Gi
    route:
      internal:
        enabled: true
        parentRefs:
          - name: internal-gateway
            namespace: network
        hostnames:
          - memini.dcunha.io
    serviceMonitor:
      main:
        enabled: true
