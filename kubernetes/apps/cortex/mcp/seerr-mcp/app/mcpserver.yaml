---
# Source: https://www.npmjs.com/package/@jhomen368/overseerr-mcp
# Package: @jhomen368/overseerr-mcp (npm) — Jellyseerr media requests
# Note: env var is SEERR_URL — NOT SEERR_HOST (silently breaks)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-seerr
spec:
  env:
    - name: SEERR_URL
      value: http://seerr.media.svc.cluster.local
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp
  groupRef:
    name: artemis-media
  image: node:24.16.0-alpine@sha256:2bdb65ed1dab192432bc31c95f94155ca5ad7fc1392fb7eb7526ab682fa5bf14
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command:
            - "npx"
            - "-y"
            - "@jhomen368/overseerr-mcp"
          envFrom:
            - secretRef:
                name: seerr-mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmp
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  transport: stdio
