---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# 1Password item: "Context7" in kubernetes vault — field: API_KEY
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname context7-mcp
spec:
  dataFrom:
    - extract:
        key: Context7
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        CONTEXT7_API_KEY: "{{ .API_KEY }}"
