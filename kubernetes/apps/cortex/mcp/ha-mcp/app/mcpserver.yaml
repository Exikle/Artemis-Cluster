---
# Source: https://github.com/homeassistant-ai/ha-mcp
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-ha
spec:
  env:
    - name: HOMEASSISTANT_URL
      value: http://home-assistant.home-automation.svc.cluster.local:8123
  groupRef:
    name: artemis-ops
  image: ghcr.io/homeassistant-ai/ha-mcp:latest@sha256:eb7cf2349e4ad99d8a0a55447e8c67a942d35602d9cb455649ff0063de6dfa09
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
  proxyPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  secrets:
    - name: ha-mcp
      key: HA_TOKEN
      targetEnvName: HOMEASSISTANT_TOKEN
  transport: stdio
