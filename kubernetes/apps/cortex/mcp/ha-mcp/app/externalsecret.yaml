---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# 1Password item: "home-assistant" in kubernetes vault
# Required field: HA_TOKEN (Home Assistant long-lived access token)
# Create in Home Assistant: Profile → Long-Lived Access Tokens → Create Token
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname ha-mcp
spec:
  dataFrom:
    - extract:
        key: home-assistant
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        HA_TOKEN: "{{ .HA_TOKEN }}"
