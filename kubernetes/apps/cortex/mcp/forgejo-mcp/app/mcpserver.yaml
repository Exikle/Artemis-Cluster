---
# Source: https://code.squarecows.com/SquareCows/forgejo-mcp
# Package: @ric_/forgejo-mcp@0.1.5 (npm) — 103 tools: repos, issues, PRs, orgs, users, admin
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-forgejo
spec:
  env:
    - name: FORGEJO_URL
      value: https://git.dcunha.io
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp
  groupRef:
    name: artemis-ops
  image: node:24.16.0-alpine@sha256:fb71d01345f11b708a3553c66e7c74074f2d506400ea81973343d915cb64eef0
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command:
            - "npx"
            - "-y"
            - "@ric_/forgejo-mcp@0.1.5"
          envFrom:
            - secretRef:
                name: forgejo-mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmp
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  transport: stdio
