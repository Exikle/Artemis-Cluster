---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# 1Password item: "forgejo" in kubernetes vault
# Required field: FORGEJO_ADMIN_TOKEN
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname forgejo-mcp
spec:
  dataFrom:
    - extract:
        key: forgejo
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        FORGEJO_TOKEN: "{{ .FORGEJO_ADMIN_TOKEN }}"
