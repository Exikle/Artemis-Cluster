---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# 1Password item: "github" in kubernetes vault
# Required field: GITHUB_PAT (GitHub PAT with repo/read permissions)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname github-mcp
spec:
  dataFrom:
    - extract:
        key: github
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        GITHUB_PERSONAL_ACCESS_TOKEN: "{{ .GITHUB_PAT }}"
