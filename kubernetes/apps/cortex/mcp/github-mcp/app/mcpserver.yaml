---
# Source: https://github.com/github/github-mcp-server (official GitHub MCP server)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-github
spec:
  env:
    - name: GITHUB_API_URL
      value: https://api.github.com
    - name: LOG_LEVEL
      value: info
  groupRef:
    name: artemis-ops
  image: ghcr.io/github/github-mcp-server:v1.4.0@sha256:2afb26356481d1a350e14544a6e160f7f7ec1561a1ea309b823665abf0309036
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  secrets:
    - name: github-mcp
      key: GITHUB_PERSONAL_ACCESS_TOKEN
      targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
  transport: stdio
