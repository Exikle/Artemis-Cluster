---
# Source: https://github.com/github/github-mcp-server (official GitHub MCP server)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-github
spec:
  env:
    - name: GITHUB_API_URL
      value: https://api.github.com
    - name: LOG_LEVEL
      value: info
  groupRef:
    name: artemis-ops
  image: ghcr.io/github/github-mcp-server:v1.2.0@sha256:510a9d32d234763e06a5d929839c707e3a460737d18bba7efb3aaf9d1c69e238
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  secrets:
    - name: github-mcp
      key: GITHUB_PERSONAL_ACCESS_TOKEN
      targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
  transport: stdio
