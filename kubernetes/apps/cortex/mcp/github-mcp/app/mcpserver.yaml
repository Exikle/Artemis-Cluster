---
# Source: https://github.com/github/github-mcp-server (official GitHub MCP server)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-github
spec:
  env:
    - name: GITHUB_API_URL
      value: https://api.github.com
    - name: LOG_LEVEL
      value: info
  groupRef:
    name: artemis-ops
  image: ghcr.io/github/github-mcp-server:v1.1.2@sha256:30197479d8036c7811892bc07e06f9a05c9ef3cdd79bc59f256d50647f95788c
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  secrets:
    - name: github-mcp
      key: GITHUB_PERSONAL_ACCESS_TOKEN
      targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
  transport: stdio
