---
# Source: https://github.com/ihor-sokoliuk/mcp-searxng
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  env:
    - name: SEARXNG_URL
      value: http://searxng.cortex.svc.cluster.local:8080
  groupRef:
    name: artemis-general
  image: docker.io/isokoliuk/mcp-searxng:1.3.4@sha256:e07edfe205cd9529893329bd6124302e48bac3b613bd1affb31ff8b20cab6ae3
  proxyPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  transport: stdio
