      value: ""
    - name: SEARXNG_URL
      value: http://searxng.cortex.svc.cluster.local:8080
  groupRef:
    name: artemis-general
  image: docker.io/isokoliuk/mcp-searxng:1.6.0@sha256:56aef42909b7b95c232ed85335efffc38fb518dcd7b40af94b1a1dec352b5d56
  proxyPort: 8080
  resources:
