---
# Source: https://github.com/ihor-sokoliuk/mcp-searxng
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  env:
    - name: SEARXNG_URL
      value: http://searxng.cortex.svc.cluster.local:8080
  groupRef:
    name: artemis-general
  image: docker.io/isokoliuk/mcp-searxng:1.3.2@sha256:d811b890c5ee6d39ed89bdca72f9af12a994127de2608532e8e5396c6b9632a8
  proxyPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  transport: stdio
