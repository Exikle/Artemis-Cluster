---
# Source: https://github.com/ihor-sokoliuk/mcp-searxng
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  env:
    - name: SEARXNG_URL
      value: http://searxng.cortex.svc.cluster.local:8080
    - name: MCP_HTTP_PORT
      value: "3000"
  groupRef:
    name: artemis-general
  image: docker.io/isokoliuk/mcp-searxng:1.1.1@sha256:833b13fc386a8742b8dbc168e443fed3f224ef07b6a19b50b15d6ad7781d47e7
  mcpPort: 3000
  proxyPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  transport: streamable-http
