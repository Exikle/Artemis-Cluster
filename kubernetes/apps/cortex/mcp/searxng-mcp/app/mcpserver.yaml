apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  env:
    - name: MCP_HTTP_PORT
      value: ""
    - name: SEARXNG_URL
      value: http://searxng.cortex.svc.cluster.local:8080
  groupRef:
    name: artemis-general
  image: docker.io/isokoliuk/mcp-searxng:1.7.0@sha256:e9cb5c3cd9d0946e53c8b90ea10b629928e88dc7bd51cd1c5ac2d09ddb1e9a27
  proxyPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  transport: stdio
