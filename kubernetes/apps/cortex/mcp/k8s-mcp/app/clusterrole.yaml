---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - namespaces
      - nodes
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
      - events
      - serviceaccounts
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - ""
    resources:
      - "pods"
    verbs:
      - "delete"
  - apiGroups:
      - "apps"
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - "get"
      - "list"
      - "watch"
      - "patch"
      - "update"
  - apiGroups:
      - "batch"
    resources:
      - "jobs"
      - "cronjobs"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "helm.toolkit.fluxcd.io"
    resources:
      - "helmreleases"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "kustomize.toolkit.fluxcd.io"
    resources:
      - "kustomizations"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "source.toolkit.fluxcd.io"
    resources:
      - "gitrepositories"
      - "ocirepositories"
      - "helmrepositories"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "storage.k8s.io"
    resources:
      - "storageclasses"
      - "volumeattachments"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "networking.k8s.io"
    resources:
      - "ingresses"
      - "networkpolicies"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "gateway.networking.k8s.io"
    resources:
      - "gateways"
      - "httproutes"
      - "grpcroutes"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "rbac.authorization.k8s.io"
    resources:
      - "roles"
      - "rolebindings"
      - "clusterroles"
      - "clusterrolebindings"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "ceph.rook.io"
    resources:
      - "cephclusters"
      - "cephblockpools"
      - "cephfilesystems"
      - "cephobjectstores"
      - "cephobjectstoreusers"
      - "cephnfses"
      - "cephclients"
      - "cephrbdmirrors"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "monitoring.coreos.com"
    resources:
      - "prometheuses"
      - "alertmanagers"
      - "servicemonitors"
      - "podmonitors"
      - "prometheusrules"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "external-secrets.io"
    resources:
      - "externalsecrets"
      - "clustersecretstores"
      - "secretstores"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "cilium.io"
    resources:
      - "ciliumnetworkpolicies"
      - "ciliumclusterwidenetworkpolicies"
      - "ciliumendpoints"
      - "ciliumnodes"
    verbs:
      - "get"
      - "list"
      - "watch"
