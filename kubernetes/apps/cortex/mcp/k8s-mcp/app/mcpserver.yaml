---
# Source: https://github.com/containers/kubernetes-mcp-server
# Auth: in-cluster ServiceAccount (no secrets needed — auto-detects SA at runtime)
# ClusterRole mcp-k8s grants read + patch/update on workloads + read on Flux/Ceph/CNPG CRDs
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-k8s
spec:
  groupRef:
    name: artemis-ops
  image: quay.io/containers/kubernetes_mcp_server:v0.0.63@sha256:9317449ed47916a297f71b955eab57402064de852bf1fb007c4e0705754de2b3
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          args:
            - --disable-multi-cluster
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  transport: stdio
