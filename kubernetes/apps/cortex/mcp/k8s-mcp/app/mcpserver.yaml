---
# Source: https://github.com/containers/kubernetes-mcp-server
# Auth: in-cluster ServiceAccount (no secrets needed — auto-detects SA at runtime)
# ClusterRole mcp-k8s grants read + patch/update on workloads + read on Flux/Ceph/CNPG CRDs
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-k8s
spec:
  groupRef:
    name: artemis-ops
  image: quay.io/containers/kubernetes_mcp_server:v0.0.62@sha256:bd7e9ff49b0941ff230508dfceb87162c4a2be67b180c28f5d1b204fc58fa2e9
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          args:
            - --disable-multi-cluster
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  transport: stdio
