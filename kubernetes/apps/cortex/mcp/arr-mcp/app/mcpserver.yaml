---
# Source: https://github.com/aplaceforallmystuff/mcp-arr
# Package: mcp-arr-server@1.4.0 (npm) — Sonarr, Radarr, Prowlarr
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-arr
spec:
  env:
    - name: SONARR_URL
      value: http://sonarr.media.svc.cluster.local
    - name: RADARR_URL
      value: http://radarr.media.svc.cluster.local
    - name: PROWLARR_URL
      value: http://prowlarr.media.svc.cluster.local
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp
  groupRef:
    name: artemis-media
  image: node:24.18.0-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command:
            - "npx"
            - "-y"
            - "mcp-arr-server@1.4.0"
          envFrom:
            - secretRef:
                name: arr-mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmp
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  transport: stdio
