---
# Source: https://github.com/aplaceforallmystuff/mcp-arr
# Package: mcp-arr-server@1.4.0 (npm) — Sonarr, Radarr, Prowlarr
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-arr
spec:
  env:
    - name: SONARR_URL
      value: http://sonarr.media.svc.cluster.local
    - name: RADARR_URL
      value: http://radarr.media.svc.cluster.local
    - name: PROWLARR_URL
      value: http://prowlarr.media.svc.cluster.local
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp
  groupRef:
    name: artemis-media
  image: node:24.16.0-alpine@sha256:21f403ab171f2dc89bad4dd69d7721bfd15f084ccb46cdd225f31f2bc59b5c9a
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command:
            - "npx"
            - "-y"
            - "mcp-arr-server@1.4.0"
          envFrom:
            - secretRef:
                name: arr-mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmp
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  transport: stdio
