---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# 1Password item: "grafana" in kubernetes vault
# Required field: GRAFANA_SERVICE_ACCOUNT_TOKEN
# Create in Grafana: Administration → Service Accounts → Add service account token
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname grafana-mcp
spec:
  dataFrom:
    - extract:
        key: grafana
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: "{{ .GRAFANA_SERVICE_ACCOUNT_TOKEN }}"
