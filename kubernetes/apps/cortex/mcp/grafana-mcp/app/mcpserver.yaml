---
# Source: https://github.com/grafana/mcp-grafana (official Grafana MCP server)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-grafana
spec:
  env:
    - name: GRAFANA_URL
      value: http://grafana-service.observability.svc.cluster.local:3000
  groupRef:
    name: artemis-general
  image: docker.io/grafana/mcp-grafana:0.15.2@sha256:f7006c42d81e444b77694e4c63c75577a5c45a187088d9799aff23d5e13765cf
  mcpPort: 8000
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  secrets:
    - name: grafana-mcp
      key: GRAFANA_SERVICE_ACCOUNT_TOKEN
      targetEnvName: GRAFANA_SERVICE_ACCOUNT_TOKEN
  transport: sse
