---
# Source: https://github.com/rohitg00/agentmemory (@agentmemory/mcp)
# Connects to in-cluster agentmemory service — secret reused from agentmemory ExternalSecret
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-agentmemory
spec:
  env:
    - name: AGENTMEMORY_URL
      value: http://agentmemory.cortex.svc.cluster.local:3111
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp
  groupRef:
    name: artemis-general
  image: node:24.16.0-alpine@sha256:2bdb65ed1dab192432bc31c95f94155ca5ad7fc1392fb7eb7526ab682fa5bf14
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command:
            - "npx"
            - "-y"
            - "@agentmemory/mcp"
          envFrom:
            - secretRef:
                name: agentmemory
          volumeMounts:
            - mountPath: /tmp
              name: tmp
  proxyPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  transport: stdio
