---
use_default_settings: true

general:
  instance_name: "Search"
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json

server:
  base_url: "https://searxng.dcunha.io"
  port: 8080
  bind_address: "0.0.0.0"
  limiter: false
  public_instance: false
  image_proxy: true

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: auto
  infinite_scroll: true
  query_in_title: true
  results_on_new_tab: false

engines:
  - name: wikidata
    engine: wikidata
    disabled: true

enabled_plugins:
  - Hash plugin
  - Search on category select
  - Self Information
  - Tracker URL remover
  - Unit converter plugin
  - Calculator
