---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-registry-pull
spec:
  dataFrom:
    - extract:
        key: forgejo
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: forgejo-registry-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"git.dcunha.io":{"username":"exikle","password":"{{ .FORGEJO_PAT }}","auth":"{{ printf "exikle:%s" .FORGEJO_PAT | b64enc }}"}}}'
      engineVersion: v2
