---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentmemory
spec:
  chartRef:
    kind: OCIRepository
    name: agentmemory
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      agentmemory:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: git.dcunha.io/exikle/agentmemory
              tag: 0.9.21-5a354f9
            env:
              AGENTMEMORY_AUTO_COMPRESS: "false"
              AGENTMEMORY_DATA_DIR: /data
              AGENTMEMORY_INJECT_CONTEXT: "false"
              AGENTMEMORY_REFLECT: "false"
              AGENTMEMORY_TOOLS: core
              CONSOLIDATION_ENABLED: "true"
            envFrom:
              - secretRef:
                  name: agentmemory
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  initialDelaySeconds: 15
                  periodSeconds: 10
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi
            # Entrypoint writes iii-config into node_modules at startup — readOnlyRootFilesystem must be false.
            # Runs as node user (UID 1000) via k8s securityContext; gosu/chown skipped when non-root.
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    persistence:
      data:
        existingClaim: agentmemory
        globalMounts:
          - path: /data
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://agentmemory.dcunha.io/agentmemory/livez
            conditions: ["[STATUS] == 200"]
            group: internal
        hostnames:
          - "{{ .Release.Name }}.dcunha.io"
        parentRefs:
          - name: internal-gateway
            namespace: network
    service:
      app:
        ports:
          http:
            port: 3111
