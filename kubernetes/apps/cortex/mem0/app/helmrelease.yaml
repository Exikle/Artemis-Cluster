---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mem0
spec:
  chartRef:
    kind: OCIRepository
    name: mem0
  interval: 1h
  values:
    controllers:
      mem0:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mem0/openmemory-mcp
              tag: latest
            env:
              OPENAI_API_KEY: "sk-not-needed"
              QDRANT_URL: "http://qdrant.cortex.svc.cluster.local:6333"
            envFrom:
              - secretRef:
                  name: mem0
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: &port 8765
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "mem0.dcunha.io"
        parentRefs:
          - name: internal-gateway
            namespace: network
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-block
        globalMounts:
          - path: /app/data
      config:
        type: configMap
        name: mem0-config
        globalMounts:
          - path: /usr/src/openmemory/config.json
            subPath: config.json
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
