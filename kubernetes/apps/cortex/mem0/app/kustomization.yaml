---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
configMapGenerator:
  - name: mem0-config
    files:
      - config.json=./resources/config.json
      - memory.py=./resources/memory.py
generatorOptions:
  disableNameSuffixHash: true
