---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pipelines
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: pipelines
    template:
      data:
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
  dataFrom:
    - extract:
        key: memini
