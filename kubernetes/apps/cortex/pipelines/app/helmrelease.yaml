---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pipelines
spec:
  chartRef:
    kind: OCIRepository
    name: pipelines
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
    controllers:
      pipelines:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-pipeline:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - cp /pipeline-src/agentmemory_memory_filter_pipeline.py /app/pipelines/agentmemory_memory_filter_pipeline.py
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/pipelines
              tag: main
            env:
              PORT: &port 9099
            envFrom:
              - secretRef:
                  name: pipelines
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      pipeline-src:
        type: configMap
        name: pipelines-config
        globalMounts:
          - path: /pipeline-src/agentmemory_memory_filter_pipeline.py
            subPath: agentmemory_memory_filter_pipeline.py
            readOnly: true
      pipelines-dir:
        type: emptyDir
        advancedMounts:
          pipelines:
            copy-pipeline:
              - path: /app/pipelines
                subPath: pipelines
            app:
              - path: /app/pipelines
                subPath: pipelines
    service:
      app:
        ports:
          http:
            port: *port
