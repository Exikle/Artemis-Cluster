---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname home-assistant
spec:
  dataFrom:
    - extract:
        key: home-assistant
    - extract:
        key: govee
    - extract:
        key: leviton
    - extract:
        key: pirate-weather
        # - extract:
        #     key: google-nest
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        HASS_GOVEE_API_KEY: "{{ .GOVEE_API_KEY }}"
        HASS_LEVITON_USERNAME: "{{ .LEVITON_USERNAME }}"
        HASS_LEVITON_PASSWORD: "{{ .LEVITON_PASSWORD }}"
        HASS_ELEVATION: "{{ .ELEVATION }}"
        # HASS_GOOGLE_PROJECT_ID: "{{ .HASS_GOOGLE_PROJECT_ID }}"
        # HASS_GOOGLE_SECURE_DEVICES_PIN: "{{ .HASS_GOOGLE_SECURE_DEVICES_PIN }}"
        HASS_LATITUDE: "{{ .LATITUDE }}"
        HASS_LONGITUDE: "{{ .LONGITUDE }}"
        HASS_PIRATE_WEATHER_API_KEY: "{{ .PIRATE_WEATHER_API_KEY }}"
        POCKET_ID_CLIENT_SECRET: "{{ .POCKET_ID_CLIENT_SECRET }}"
