---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgesync
spec:
  chartRef:
    kind: OCIRepository
    name: forgesync
  interval: 30m
  values:
    controllers:
      forgesync:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
        containers:
          app:
            # TODO: replace with ghcr.io/exikle/forgesync once available
            image:
              repository: git.erwanleboucher.dev/eleboucher/forgesync
              tag: 0.0.1
            args:
              - run
            env:
              FORGESYNC_SOURCE_URL: http://forgejo.external-endpoints.svc.cluster.local:3000
              FORGESYNC_BOT_USERNAME: duskbot
              FORGESYNC_LOG_FORMAT: json
            envFrom:
              - secretRef:
                  name: forgesync-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
