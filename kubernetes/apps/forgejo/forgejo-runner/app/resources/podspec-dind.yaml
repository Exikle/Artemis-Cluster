---
initContainers:
  - name: dind
    image: docker:29.6-dind@sha256:66d292e5c26bd33a6f6f61cacb880de2186339a524ecba1ce098dbbaceed6515
    securityContext:
      privileged: true
    restartPolicy: Always
    env:
      - name: DOCKER_TLS_CERTDIR
        value: /certs
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 4Gi
    volumeMounts:
      - name: docker-storage
        mountPath: /var/lib/docker
      - name: docker-certs
        mountPath: /certs
    readinessProbe:
      exec:
        command:
          - sh
          - -c
          - test -f /certs/client/ca.pem && test -f /certs/client/cert.pem && test -f /certs/client/key.pem
      initialDelaySeconds: 2
      periodSeconds: 1
containers:
  - env:
      - name: DEBIAN_FRONTEND
        value: noninteractive
      - name: DOCKER_HOST
        value: tcp://localhost:2376
      - name: DOCKER_TLS_VERIFY
        value: "1"
      - name: DOCKER_CERT_PATH
        value: /certs/client
    image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:95028d7822019f271ecdf63f2f1ad86c0070fef838a0586c1c24e985219c6e41
    imagePullPolicy: IfNotPresent
    name: main
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: 100m
        memory: 256Mi
    volumeMounts:
      - name: docker-certs
        mountPath: /certs
        readOnly: true
volumes:
  - name: docker-storage
    emptyDir: {}
  - name: docker-certs
    emptyDir: {}
restartPolicy: Never
