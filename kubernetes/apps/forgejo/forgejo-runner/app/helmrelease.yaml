---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  interval: 30m
  values:
    defaultPodOptions:
      automountServiceAccountToken: true

    controllers:
      forgejo-runner:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: "12.10.4"
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          runner:
            image:
              repository: git.dcunha.io/exikle/forgejo-runner
              tag: 12.10.2@sha256:33f74071a49220546c5be7755c86268b3bd6bb6106d2ae8516c91d4823a1f983
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url "http://forgejo.external-endpoints.svc.cluster.local:3000" \
                  --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                  --token-url file:///etc/forgejo-runner-secret/token
            resources:
              requests:
                cpu: 5m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    persistence:
      config:
        type: configMap
        name: forgejo-runner-config
        globalMounts:
          - path: /config
      plugin:
        type: emptyDir
        globalMounts:
          - path: /plugin
      runner-secret:
        type: secret
        name: forgejo-runner-secret
        globalMounts:
          - path: /etc/forgejo-runner-secret
            readOnly: true
      cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-block
        globalMounts:
          - path: /data/cache
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp

    rbac:
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - batch
              resources:
                - jobs
              verbs:
                - create
                - get
                - list
                - watch
                - delete
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - get
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
