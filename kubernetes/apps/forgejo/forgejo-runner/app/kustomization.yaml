---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./rbac.yaml
configMapGenerator:
  - name: forgejo-runner-config
    files:
      - podspec-default.yaml=./resources/podspec-default.yaml
      - podspec-dind.yaml=./resources/podspec-dind.yaml
      - podspec-talos.yaml=./resources/podspec-talos.yaml
      - runner.yaml=./resources/runner.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
