---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: truenas-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: truenas-exporter
  interval: 1h
  values:
    controllers:
      truenas-exporter:
        containers:
          app:
            image:
              repository: ghcr.io/supporterino/truenas-graphite-to-prometheus
              tag: v2.2.1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        # TrueNAS (10.10.99.100) pushes graphite metrics to port 9109
        # Prometheus scrapes converted metrics from port 9108
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.10.99.93
        ports:
          metrics:
            port: 9108
          graphite:
            port: 9109
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 1m
            scrapeTimeout: 30s
