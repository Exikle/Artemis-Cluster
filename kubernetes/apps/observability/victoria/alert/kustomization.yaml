---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: vm-alert-rules
    files:
      - alert-rules.yaml=config/rules.yaml
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
