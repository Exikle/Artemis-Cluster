# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaski
spec:
  chartRef:
    kind: OCIRepository
    name: chaski
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: chaski-secret
    monitoring:
      serviceMonitor:
        enabled: true
    config:
      targets:
        pushover:
          apprise:
            url: 'pover://{{ env "PUSHOVER_USER_KEY" }}@{{ env "PUSHOVER_TOKEN" }}/'
      routes:
        alertmanager:
          target: pushover
          title: '[{{ .payload.status | toUpper }}{{ if eq .payload.status "firing" }}:{{ len .payload.alerts }}{{ end }}] {{ .payload.commonLabels.alertname }}'
          message: |-
            {{- $desc := coalesce .payload.commonAnnotations.description .payload.commonAnnotations.summary .payload.commonAnnotations.message "No description available" }}
            {{ $desc }}
            <small>
            {{- range $k, $v := .payload.commonLabels }}
            <b>{{ $k }}:</b> {{ $v }}
            {{- end }}
            </small>
          params:
            html: "1"
            priority: '{{ if eq .payload.status "firing" }}1{{ else }}0{{ end }}'
            sound: gamelan
            url: "{{ .payload.externalURL }}"
            url_title: View in Alertmanager
            ttl: "86400"
