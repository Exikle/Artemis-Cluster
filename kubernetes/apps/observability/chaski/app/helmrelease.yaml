# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaski
spec:
  chartRef:
    kind: OCIRepository
    name: chaski
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: chaski-secret
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    config:
      targets:
        pushover:
          http:
            url: https://api.pushover.net/1/messages.json
            method: POST
            headers:
              Content-Type: application/x-www-form-urlencoded
      routes:
        alertmanager:
          target: pushover
          message: |-
            {{- $title := printf "[%s%s] %s" (.payload.status | toUpper) (ternary (printf ":%d" (len .payload.alerts)) "" (eq .payload.status "firing")) .payload.commonLabels.alertname -}}
            {{- $desc := coalesce .payload.commonAnnotations.description .payload.commonAnnotations.summary .payload.commonAnnotations.message "No description available" -}}
            {{- $body := $desc -}}
            {{- range $k, $v := .payload.commonLabels -}}
            {{- $body = printf "%s\n<b>%s:</b> %s" $body $k $v -}}
            {{- end -}}
            token={{ env "PUSHOVER_TOKEN" | urlquery }}&user={{ env "PUSHOVER_USER_KEY" | urlquery }}&html=1&priority={{ ternary "1" "0" (eq .payload.status "firing") }}&sound=gamelan&title={{ $title | urlquery }}&message={{ $body | urlquery }}&url={{ .payload.externalURL | urlquery }}&url_title=View+in+Alertmanager
