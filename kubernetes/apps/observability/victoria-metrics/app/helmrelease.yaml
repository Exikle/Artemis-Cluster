---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics
  interval: 1h
  values:
    fullnameOverride: victoria-metrics

    defaultRules:
      disabled:
        KubeHpaMaxedOut: true

    # Automatically create GrafanaDatasource CRDs for the Grafana Operator
    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana

    # Automatically create GrafanaDashboard CRDs for the Grafana Operator
    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana

    # Grafana is managed by grafana-operator separately
    grafana:
      enabled: false
      forceDeployDatasource: true

    prometheus-operator-crds:
      enabled: false

    kube-state-metrics:
      enabled: false

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+|etc/nfsmount\.conf)($|/)

    # Talos: etcd metrics on port 2381 (HTTP, no auth) — port 2379 is the mTLS client port
    kubeEtcd:
      service:
        port: 2381
        targetPort: 2381
        selector:
          component: kube-apiserver
      vmServiceScrape:
        spec:
          endpoints:
            - port: http-metrics
              scheme: http

    # Talos: controller-manager cert is signed by Talos CA, not k8s CA — skip TLS verify
    kubeControllerManager:
      vmServiceScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    # Talos: scheduler cert is signed by Talos CA, not k8s CA — skip TLS verify
    kubeScheduler:
      vmServiceScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    # Cilium replaces kube-proxy
    kubeProxy:
      enabled: false

    # vmsingle: single-node metric storage
    vmsingle:
      spec:
        retentionPeriod: 14d
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
          storageClassName: ceph-block
      route:
        enabled: true
        hostnames:
          - vmsingle.dcunha.io
        parentRefs:
          - name: internal-gateway
            namespace: network

    # vmauth: unified proxy routing metrics and logs queries
    vmauth:
      enabled: true
      spec:
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/label/.*
                - /api/v1/series.*
                - /api/v1/rules.*
              url_prefix: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs-server.observability.svc.cluster.local:9428

    # vmagent: scrape agent — selects all ServiceMonitors/PodMonitors cluster-wide
    vmagent:
      spec:
        selectAllByDefault: true
        extraArgs:
          promscrape.streamParse: "true"
          promscrape.maxScrapeSize: 50MiB

    # vmalert: rule evaluation engine
    vmalert:
      spec:
        extraArgs:
          external.url: https://vmalert.dcunha.io
        datasource:
          url: http://vmauth-victoria-metrics.observability.svc.cluster.local:8427
      route:
        enabled: true
        hostnames:
          - vmalert.dcunha.io
        parentRefs:
          - name: internal-gateway
            namespace: network

    # alertmanager: ported from AlertmanagerConfig CRD
    alertmanager:
      enabled: true
      useManagedConfig: true
      spec:
        externalURL: https://vmalertmanager.dcunha.io
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 1Gi
      route:
        enabled: true
        hostnames:
          - vmalertmanager.dcunha.io
        parentRefs:
          - name: internal-gateway
            namespace: network
      config:
        route:
          receiver: pushover
          repeat_interval: 12h
          group_by:
            - alertname
            - cluster
            - job
          group_interval: 5m
          group_wait: 1m
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: heartbeat
              group_interval: 2m
              group_wait: 0s
              repeat_interval: 2m30s
              matchers:
                - alertname = Watchdog
            - receiver: pushover
              matchers:
                - severity = critical
        inhibit_rules:
          - equal:
              - alertname
              - namespace
            source_matchers:
              - severity = critical
            target_matchers:
              - severity = warning
        receivers:
          - name: blackhole
          - name: heartbeat
            webhook_configs:
              - http_config:
                  bearer_token_secret:
                    name: vmalertmanager-secret
                    key: HEARTBEAT_TOKEN
                url_secret:
                  name: vmalertmanager-secret
                  key: HEARTBEAT_URL
          - name: pushover
            pushover_configs:
              - html: true
                message: |-
                  {{- range .Alerts }}
                    {{- if ne .Annotations.description "" }}
                      {{ .Annotations.description }}
                    {{- else if ne .Annotations.summary "" }}
                      {{ .Annotations.summary }}
                    {{- else if ne .Annotations.message "" }}
                      {{ .Annotations.message }}
                    {{- else }}
                      Alert description not available
                    {{- end }}
                    {{- if gt (len .Labels.SortedPairs) 0 }}
                      <small>
                        {{- range .Labels.SortedPairs }}
                          <b>{{ .Name }}:</b> {{ .Value }}
                        {{- end }}
                      </small>
                    {{- end }}
                  {{- end }}
                priority: |-
                  {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
                send_resolved: true
                sound: gamelan
                title: >-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                token:
                  name: vmalertmanager-secret
                  key: ALERTMANAGER_PUSHOVER_TOKEN
                user_key:
                  name: vmalertmanager-secret
                  key: PUSHOVER_USER_KEY
                url_title: View in Alertmanager

    additionalVictoriaMetricsMap:
      dockerhub-rules:
        create: true
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        create: true
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      zfs-rules:
        create: true
        groups:
          - name: zfs
            rules:
              - alert: ZfsUnexpectedPoolState
                annotations:
                  summary: ZFS pool {{$labels.zpool}} on {{$labels.instance}} is in a unexpected state {{$labels.state}}
                expr: node_zfs_zpool_state{state!="online"} > 0
                labels:
                  severity: critical
