---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ServiceMonitor
              name: kube-state-metrics
            patch: |
              - op: add
                path: /spec/endpoints/0/honorTimestamps
                value: false
  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics-configmap
      valuesKey: flux-metrics.yaml
  values:
    cleanPrometheusOperatorObjectNames: true

    defaultRules:
      disabled:
        KubeHpaMaxedOut: true
        # Replaced below with per-instance thresholds
        NodeMemoryHighUtilization: true
      rules:
        # increase30d lookback exceeds 14d retention — these rules can never evaluate
        kubeApiserverAvailability: false
        kubeApiserverBurnrate: false

    grafana:
      enabled: false

    # Drop high-cardinality apiserver histogram buckets (~40K series reduction)
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: apiserver_request_body_size_bytes_bucket
          - action: drop
            sourceLabels:
              - __name__
            regex: apiserver_watch_cache_read_wait_seconds_bucket
          - action: drop
            sourceLabels:
              - __name__
            regex: apiserver_watch_events_sizes_bucket
          - action: drop
            sourceLabels:
              - __name__
            regex: apiserver_watch_list_duration_seconds_bucket
          - action: drop
            sourceLabels:
              - __name__
              - verb
            regex: apiserver_request_duration_seconds_bucket;(WATCH|LIST)

    # Cilium replaces kube-proxy
    kubeProxy:
      enabled: false

    # Talos: etcd on port 2381 (HTTP metrics), selector targets kube-apiserver static pods
    kubeEtcd:
      service:
        port: 2381
        targetPort: 2381
        selector:
          component: kube-apiserver
      serviceMonitor:
        scheme: http
        insecureSkipVerify: true

    # Talos: controller-manager cert signed by Talos CA, not k8s CA
    kubeControllerManager:
      serviceMonitor:
        https: true
        insecureSkipVerify: true

    # Talos: scheduler cert signed by Talos CA, not k8s CA
    kubeScheduler:
      serviceMonitor:
        https: true
        insecureSkipVerify: true

    # Rename job from "core-dns" to "coredns" to match alert expressions
    coreDns:
      serviceMonitor:
        relabelings:
          - action: replace
            targetLabel: job
            replacement: coredns

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+|etc/nfsmount\.conf)($|/)

    prometheusOperator:
      admissionWebhooks:
        patch:
          enabled: true

    prometheus:
      route:
        main:
          enabled: true
          annotations:
            external-dns.alpha.kubernetes.io/internal: "true"
          hostnames:
            - prometheus.dcunha.io
          parentRefs:
            - name: internal-gateway
              namespace: network
              sectionName: https
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        externalUrl: https://prometheus.dcunha.io
        retention: 14d
        retentionSize: 50GB
        walCompression: true
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi

    alertmanager:
      route:
        main:
          enabled: true
          annotations:
            external-dns.alpha.kubernetes.io/internal: "true"
          hostnames:
            - alertmanager.dcunha.io
          parentRefs:
            - name: internal-gateway
              namespace: network
              sectionName: https
      alertmanagerSpec:
        alertmanagerConfiguration:
          name: alertmanager
        externalUrl: https://alertmanager.dcunha.io
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi

    additionalPrometheusRulesMap:
      memory-rules:
        groups:
          - name: node-memory
            rules:
              - alert: NodeMemoryHighUtilization
                annotations:
                  description: 'Memory is filling up at {{ $labels.instance }}, has been above {{ printf "%.f" $value }}% for the last 15 minutes, is currently at {{ printf "%.1f" $value }}%.'
                  runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememoryhighutilization
                  summary: Host is running out of memory.
                expr: |
                  (
                    100 - (100 * node_memory_MemAvailable_bytes{job="node-exporter",instance!="pantheon"}
                    / node_memory_MemTotal_bytes{job="node-exporter",instance!="pantheon"}) > 90
                  )
                  or
                  (
                    100 - (100 * node_memory_MemAvailable_bytes{job="node-exporter",instance="pantheon"}
                    / node_memory_MemTotal_bytes{job="node-exporter",instance="pantheon"}) > 98
                  )
                for: 15m
                labels:
                  severity: warning
      etcd-fragmentation-fix:
        groups:
          - name: etcd
            rules:
              - alert: EtcdDatabaseHighFragmentationRatio
                annotations:
                  description: 'etcd cluster "{{ $labels.job }}": database size in use on instance {{ $labels.instance }} is {{ $value | humanizePercentage }} of the actual allocated disk space, please run defragmentation (e.g. etcdctl defrag) to retrieve the unused fragmented disk space.'
                  runbook_url: https://etcd.io/docs/v3.5/op-guide/maintenance/#defragmentation
                  summary: etcd database size in use is less than 50% of the actual allocated storage.
                expr: (1 - etcd_mvcc_db_total_size_in_use_in_bytes / etcd_mvcc_db_total_size_in_bytes) > 0.6
                for: 10m
                labels:
                  severity: warning
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      zfs-rules:
        groups:
          - name: zfs
            rules:
              - alert: ZfsUnexpectedPoolState
                annotations:
                  summary: ZFS pool {{$labels.zpool}} on {{$labels.instance}} is in a unexpected state {{$labels.state}}
                expr: node_zfs_zpool_state{state!="online"} > 0
                labels:
                  severity: critical
