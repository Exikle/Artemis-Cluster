---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: pushover
    repeatInterval: 12h
    groupBy:
      - alertname
      - cluster
      - job
    groupInterval: 5m
    groupWait: 1m
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: heartbeat
        groupInterval: 2m
        groupWait: 0s
        repeatInterval: 2m30s
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      - receiver: pushover
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: blackhole
    - name: heartbeat
      webhookConfigs:
        - httpConfig:
            bearerTokenSecret:
              name: alertmanager-secret
              key: HEARTBEAT_TOKEN
          urlSecret:
            name: alertmanager-secret
            key: HEARTBEAT_URL
    - name: pushover
      webhookConfigs:
        - url: http://chaski.observability.svc.cluster.local:8080/hooks/alertmanager
          sendResolved: true
