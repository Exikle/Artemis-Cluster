---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: icmp
spec:
  jobName: blackbox-icmp
  module: icmp
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        # --- Network / Core ---
        - 10.10.99.1 # UCG-Max (Gateway)
        - 10.10.99.100 # TrueNAS Scale
        - 10.10.99.104 # Proxmox

        # --- Talos Control Plane ---
        - talos-cp-01.dcunha.io # 10.10.99.101
        - talos-cp-02.dcunha.io # 10.10.99.102
        - talos-cp-03.dcunha.io # 10.10.99.103

        # --- Talos Workers ---
        - talos-w-01.dcunha.io # 10.10.99.201
        - talos-w-02.dcunha.io # 10.10.99.202
        - talos-gpu-01.dcunha.io # 10.10.99.203

        # --- External/WAN ---
        - 1.1.1.1
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: tcp
spec:
  jobName: blackbox-tcp
  module: tcp_connect
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - 10.10.99.100:2049 # TrueNAS NFS
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: http
spec:
  jobName: blackbox-http
  module: http_2xx
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://unifi.dcunha.io
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
