---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: icmp
spec:
  jobName: blackbox-icmp
  module: icmp
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        # --- Network / Core ---
        - 10.10.99.1 # UCG-Max (Gateway)
        - 10.10.99.100 # TrueNAS Scale
        - 10.10.99.104 # Proxmox

        # --- Talos Control Plane ---
        - 10.10.99.101 # talos-cp-01
        - 10.10.99.102 # talos-cp-02
        - 10.10.99.103 # talos-cp-03

        # --- Talos Workers ---
        - 10.10.99.201 # talos-w-01
        - 10.10.99.202 # talos-w-02
        - 10.10.99.203 # talos-gpu-01
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: tcp
spec:
  jobName: blackbox-tcp
  module: tcp_connect
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - 10.10.99.100:2049 # TrueNAS NFS
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: http
spec:
  jobName: blackbox-http
  module: http_2xx
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://unifi.dcunha.io
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
