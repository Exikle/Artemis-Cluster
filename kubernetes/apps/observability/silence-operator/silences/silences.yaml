---
apiVersion: monitoring.giantswarm.io/v1alpha1
kind: Silence
metadata:
  name: kube-hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
  targetTags: []

---
# pantheon (Proxmox host) consistently runs at ~94% — hardware limit, not an actionable alert
apiVersion: monitoring.giantswarm.io/v1alpha1
kind: Silence
metadata:
  name: pantheon-memory-high
spec:
  matchers:
    - name: alertname
      value: NodeMemoryHighUtilization
    - name: instance
      value: pantheon
  targetTags: []

---
# Talos mounts /etc/nfsmount.conf as a bind mount — not a real filesystem
apiVersion: monitoring.giantswarm.io/v1alpha1
kind: Silence
metadata:
  name: ceph-node-diskspace-nfsmount
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: mountpoint
      value: /etc/nfsmount.conf
  targetTags: []
