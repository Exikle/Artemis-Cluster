---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etcd-defrag
spec:
  chartRef:
    kind: OCIRepository
    name: etcd-defrag
  interval: 1h
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      hostNetwork: true
      hostPID: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    controllers:
      etcd-defrag:
        type: cronjob
        cronjob:
          schedule: "@daily"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/ahrtr/etcd-defrag
              tag: v0.41.0@sha256:c7b34d2574d7cec173d6626b0fc4d20b950b878538ad591077890301ec7db1e4
            args:
              - --endpoints=https://127.0.0.1:2379
              - --cluster
              - --cacert=/certs/ca.crt
              - --cert=/certs/admin.crt
              - --key=/certs/admin.key
              - --defrag-rule=dbQuotaUsage > 0.5 || dbSizeFree > 100*1024*1024
              - --move-leader
              - --wait-between-defrags=30s
              - --etcd-storage-quota-bytes=2147483648
              - --auto-disalarm
              - --disalarm-threshold=0.8
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 128Mi
            securityContext:
              privileged: true
    persistence:
      certs:
        type: hostPath
        hostPath: /system/secrets/etcd
        globalMounts:
          - path: /certs
            readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          etcd-defrag:
            app:
              - path: /tmp
                subPath: tmp
