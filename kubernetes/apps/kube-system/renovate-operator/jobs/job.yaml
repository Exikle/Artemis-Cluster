---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: artemis-cluster
spec:
  extraEnv:
    - name: RENOVATE_BRANCH_PREFIX
      value: "renovate-"
    - name: RENOVATE_GIT_AUTHOR
      value: "dusk-bot <171887436+dusk-bot[bot]@users.noreply.github.com>"
    - name: LOG_LEVEL
      value: debug
  image: ghcr.io/renovatebot/renovate:43.224.1@sha256:30f9649325c10631acfd483264f857b791b1c291a72abd5bfd75ff73136fc9a8
  parallelism: 1
  provider:
    name: forgejo
    endpoint: https://git.dcunha.io/api/v1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 * * * *
  secretRef: renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-secret
        key: RENOVATE_WEBHOOK_TOKEN
