---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./securitypolicy.yaml
configMapGenerator:
  - name: suwayomi
    files:
      - server.conf=./resources/server.conf
generatorOptions:
  disableNameSuffixHash: true
