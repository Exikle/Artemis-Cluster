---
apiVersion: batch/v1
kind: Job
metadata:
  name: download-ollama-setup
  namespace: media
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: downloader
          image: docker.io/curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Downloading OllamaSetup.exe..."
              curl -L -o /media/downloads/OllamaSetup.exe https://ollama.com/download/OllamaSetup.exe
              echo "Done: $(ls -lh /media/downloads/OllamaSetup.exe)"
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - "ALL"
      volumes:
        - name: media
          nfs:
            server: 10.10.99.100
            path: /mnt/atlas/media
