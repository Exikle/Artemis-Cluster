---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rreading-glasses
spec:
  chartRef:
    kind: OCIRepository
    name: rreading-glasses
  interval: 1h
  values:
    controllers:
      postgres:
        type: statefulset
        statefulset:
          volumeClaimTemplates:
            - name: data
              globalMounts:
                - path: /var/lib/postgresql/data
              accessMode: ReadWriteOnce
              size: 5Gi
              storageClass: ceph-block
        pod:
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/library/postgres
              tag: "17"
            env:
              POSTGRES_USER: postgres
              POSTGRES_DB: rreading-glasses
              POSTGRES_HOST_AUTH_METHOD: scram-sha-256
              POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
            envFrom:
              - secretRef:
                  name: rreading-glasses
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "pg_isready"
                      - "-U"
                      - "postgres"
                      - "-d"
                      - "rreading-glasses"
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "pg_isready"
                      - "-U"
                      - "postgres"
                      - "-d"
                      - "rreading-glasses"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "pg_isready"
                      - "-U"
                      - "postgres"
                      - "-d"
                      - "rreading-glasses"
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

      app:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/blampe/rreading-glasses
              tag: hardcover
            command:
              - "/main"
              - "serve"
              - "--verbose"
            env:
              POSTGRES_HOST: rreading-glasses-db
              POSTGRES_DATABASE: rreading-glasses
              POSTGRES_USER: postgres
            envFrom:
              - secretRef:
                  name: rreading-glasses
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8788
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 15m
                memory: 128Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: app
        ports:
          http:
            port: *port
      db:
        controller: postgres
        ports:
          postgres:
            port: 5432
