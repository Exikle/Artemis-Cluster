---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./pvc.yaml

configMapGenerator:
  - name: sabnzbd-scripts
    files:
      - clean.py=./resources/clean.py
      - replace_or.py=./resources/replace_or.py
generatorOptions:
  disableNameSuffixHash: true
