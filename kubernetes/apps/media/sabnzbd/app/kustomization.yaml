---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./pvc.yaml

configMapGenerator:
  - name: sabnzbd-scripts
    files:
      - fakeDetector.py=./resources/fakeDetector.py
      - deobfuscate.py=./resources/deobfuscate.py
generatorOptions:
  disableNameSuffixHash: true
