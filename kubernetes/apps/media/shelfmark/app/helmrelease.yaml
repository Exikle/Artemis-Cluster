---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
spec:
  chartRef:
    kind: OCIRepository
    name: shelfmark
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      shelfmark:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.3.1@sha256:e65d85dc19865151db8aa1c32de4e0ac066563c3db3601089d36c754eb8c95b3
            env:
              AUTH_METHOD: oidc
              DOCKERMODE: "true"
              FLASK_PORT: &port 8084
              INGEST_DIR: /media/book-ingest
              OIDC_ADMIN_GROUP: admins
              OIDC_AUTO_REDIRECT: "true"
              OIDC_CLIENT_ID: shelfmark
              OIDC_DISCOVERY_URL: "https://auth.dcunha.io/.well-known/openid-configuration"
              PGID: "1000"
              PROWLARR_URL: http://prowlarr.media.svc.cluster.local:80
              PUID: "1000"
            envFrom:
              - secretRef:
                  name: shelfmark
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 15m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      media:
        type: nfs
        path: /mnt/atlas/media
        server: 10.10.99.100
        globalMounts:
          - path: /media
      tmpfs:
        type: emptyDir
        advancedMounts:
          shelfmark:
            app:
              - path: /home/shelfmark
                subPath: home
              - path: /var/log
                subPath: log
              - path: /tmp
                subPath: tmp

    route:
      app:
        hostnames:
          - "booksearch.dcunha.io"
        parentRefs:
          - name: external-gateway
            namespace: network

    service:
      app:
        ports:
          http:
            port: *port
