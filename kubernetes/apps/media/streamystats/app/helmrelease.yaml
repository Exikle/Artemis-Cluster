---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: streamystats
spec:
  chartRef:
    kind: OCIRepository
    name: streamystats
  interval: 1h
  values:
    controllers:
      vectorchord:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: data
              globalMounts:
                - path: /var/lib/postgresql/data
              accessMode: ReadWriteOnce
              size: 10Gi
              storageClass: ceph-block
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: tensorchord/vchord-postgres
              tag: pg17-v0.4.1
            args:
              - "postgres"
              - "-c"
              - "log_checkpoints=off"
            env:
              POSTGRES_USER: postgres
              POSTGRES_DB: streamystats
              POSTGRES_HOST_AUTH_METHOD: scram-sha-256
              POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
            envFrom:
              - secretRef:
                  name: streamystats
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "pg_isready"
                      - "-U"
                      - "postgres"
                      - "-d"
                      - "streamystats"
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "pg_isready"
                      - "-U"
                      - "postgres"
                      - "-d"
                      - "streamystats"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "pg_isready"
                      - "-U"
                      - "postgres"
                      - "-d"
                      - "streamystats"
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      job-server:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/fredrikburmester/streamystats-job-server
              tag: v2.18.1
            env:
              NODE_ENV: production
              PORT: "3005"
              HOST: 0.0.0.0
              # Disable AI embeddings sync
              CRON_EMBEDDINGS_SYNC: "0 0 31 2 *"
            envFrom:
              - secretRef:
                  name: streamystats
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      nextjs-app:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/fredrikburmester/streamystats-nextjs
              tag: v2.18.1
            env:
              NODE_ENV: production
              HOSTNAME: 0.0.0.0
              JOB_SERVER_URL: http://streamystats-job-server:3005
            envFrom:
              - secretRef:
                  name: streamystats
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    persistence:
      nextjs-cache:
        type: emptyDir
        advancedMounts:
          nextjs-app:
            app:
              - path: /app/apps/nextjs-app/.next/cache
      tmpfs:
        type: emptyDir
        advancedMounts:
          vectorchord:
            app:
              - path: /tmp
                subPath: tmp
              - path: /var/run/postgresql
                subPath: pgrun
          job-server:
            app:
              - path: /tmp
                subPath: tmp
          nextjs-app:
            app:
              - path: /tmp
                subPath: tmp

    service:
      app:
        controller: nextjs-app
        ports:
          http:
            port: *port
      job-server:
        controller: job-server
        ports:
          http:
            port: 3005
      vectorchord:
        controller: vectorchord
        ports:
          postgres:
            port: 5432

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: internal
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.dcunha.io"
        parentRefs:
          - name: external-gateway
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
