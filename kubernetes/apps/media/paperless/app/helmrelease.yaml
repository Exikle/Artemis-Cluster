---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  chartRef:
    kind: OCIRepository
    name: paperless
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      paperless:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
            env:
              PAPERLESS_URL: "https://paperless.dcunha.io"
              PAPERLESS_REDIS: "redis://paperless-database.media.svc.cluster.local:6379"
              PAPERLESS_TIKA_ENABLED: "1"
              PAPERLESS_TIKA_ENDPOINT: "http://paperless-tika.media.svc.cluster.local:9998"
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: "http://paperless-gotenberg.media.svc.cluster.local:3000"
              PAPERLESS_DATA_DIR: /data
              PAPERLESS_CONSUMPTION_DIR: /ingest
              PAPERLESS_MEDIA_ROOT: /documents
              PAPERLESS_EXPORT_DIR: /export
              PAPERLESS_OCR_LANGUAGE: eng
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_ACCOUNT_ALLOW_SIGNUPS: "false"
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "true"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              PAPERLESS_CONSUMER_DELETE_DUPLICATES: "true"
              PAPERLESS_OCR_MODE: skip_noarchive
              PAPERLESS_OCR_CLEAN: clean
              PAPERLESS_FILENAME_FORMAT: "{created_year}/{correspondent}/{document_type}/{title}"
              PAPERLESS_FILENAME_DATE_ORDER: YMD
              USERMAP_UID: "1000"
              USERMAP_GID: "1000"
            envFrom:
              - secretRef:
                  name: paperless
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 5
                  httpGet:
                    path: /
                    port: &port 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 5
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false

    persistence:
      config:
        existingClaim: paperless
        globalMounts:
          - path: /data
      ocr:
        type: nfs
        path: /mnt/atlas/media/scanned-documents
        server: 10.10.99.100
        globalMounts:
          - path: /ingest
            subPath: ingest
          - path: /documents
            subPath: documents
          - path: /export
            subPath: export
      tmp:
        type: emptyDir
        advancedMounts:
          paperless:
            app:
              - path: /tmp
                subPath: tmp

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.dcunha.io"
        parentRefs:
          - name: internal-gateway
            namespace: network

    service:
      app:
        ports:
          http:
            port: *port
