---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-database
spec:
  chartRef:
    kind: OCIRepository
    name: paperless-database
  interval: 1h
  values:
    controllers:
      valkey:
        pod:
          securityContext:
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: 9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
            args:
              - --save
              - ""
              - --appendonly
              - "no"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      valkey:
        controller: valkey
        ports:
          valkey:
            port: 6379
