---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-database
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  path: ./kubernetes/apps/media/paperless/database
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  timeout: 5m
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-tika
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  path: ./kubernetes/apps/media/paperless/tika
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-gotenberg
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  path: ./kubernetes/apps/media/paperless/gotenberg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-app
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  path: ./kubernetes/apps/media/paperless/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  timeout: 5m
  dependsOn:
    - name: paperless-database
    - name: paperless-tika
    - name: paperless-gotenberg
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: paperless
      VOLSYNC_CAPACITY: 5Gi
  wait: true
