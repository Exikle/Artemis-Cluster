---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless-database
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  path: ./kubernetes/apps/media/paperless/database
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 1h
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-app
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  dependsOn:
    - name: paperless-database
    - name: rook-ceph-cluster
      namespace: rook-ceph
  path: ./kubernetes/apps/media/paperless/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 1h
  postBuild:
    substitute:
      APP: paperless
      VOLSYNC_CAPACITY: 5Gi
  components:
    - ../../../../components/volsync
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-tika
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  dependsOn:
    - name: paperless-app
  path: ./kubernetes/apps/media/paperless/tika
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 1h
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-gotenberg
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  dependsOn:
    - name: paperless-app
  path: ./kubernetes/apps/media/paperless/gotenberg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 1h
