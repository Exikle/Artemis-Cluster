---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookboss
spec:
  chartRef:
    kind: OCIRepository
    name: bookboss
  interval: 1h
  values:
    controllers:
      bookboss:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/szinn/bookboss
              tag: v0.8.26@sha256:fb5525fe40367b735be5db184d4deecdee0a515c1449c137d0c49c1a6392bc0b
            env:
              BOOKBOSS__DATABASE__DATABASE_URL: sqlite:///data/bookboss.db?mode=rwc
              BOOKBOSS__FRONTEND__BASE_URL: "https://books.dcunha.io"
              BOOKBOSS__FRONTEND__LISTEN_PORT: &port 8080
              BOOKBOSS__LIBRARY__LIBRARY_PATH: /media/book
              BOOKBOSS__IMPORT__BOOKDROP_PATH: /media/book-ingest
              BOOKBOSS__IMPORT__POLL_INTERVAL_SECS: 60
              BOOKBOSS__IMPORT__WORKER_POLL_INTERVAL_SECS: 5
              BOOKBOSS__OIDC__DISCOVERY_URL: "https://auth.dcunha.io/oauth2/openid/bookboss"
              BOOKBOSS__OIDC__CLIENT_ID: bookboss
            envFrom:
              - secretRef:
                  name: bookboss
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "books.dcunha.io"
        parentRefs:
          - name: internal-gateway
            namespace: network
      opds:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "books.dcunha.io"
        parentRefs:
          - name: external-gateway
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /opds
            backendRefs:
              - name: bookboss
                port: 8080
      koreader:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "books.dcunha.io"
        parentRefs:
          - name: external-gateway
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /koreader
            backendRefs:
              - name: bookboss
                port: 8080

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          bookboss:
            app:
              - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      media:
        type: nfs
        server: 10.10.99.100
        path: /mnt/atlas/media
        globalMounts:
          - path: /media/book
            subPath: books
          - path: /media/book-ingest
            subPath: book-ingest
