---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml

patches:
  - patch: |-
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationDestination
      metadata:
        name: komga-dst
      spec:
        kopia:
          sourceIdentity:
            sourceNamespace: media
    target:
      kind: ReplicationDestination
      name: komga-dst
