---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: komga-restart
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: komga-restart
  namespace: default
rules:
  - apiGroups:
      - "apps"
    resources:
      - "deployments"
    resourceNames:
      - "komga"
    verbs:
      - "get"
      - "patch"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: komga-restart
  namespace: default
subjects:
  - kind: ServiceAccount
    name: komga-restart
    namespace: default
roleRef:
  kind: Role
  name: komga-restart
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: komga-restart-gateway
  namespace: network
rules:
  - apiGroups:
      - "apps"
    resources:
      - "deployments"
    resourceNames:
      - "external-gateway"
    verbs:
      - "get"
      - "patch"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: komga-restart-gateway
  namespace: network
subjects:
  - kind: ServiceAccount
    name: komga-restart
    namespace: default
roleRef:
  kind: Role
  name: komga-restart-gateway
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: komga-restart
  namespace: default
  labels:
    app.kubernetes.io/name: komga
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: komga-restart
          restartPolicy: OnFailure
          containers:
            - name: restart
              image: bitnami/kubectl:latest
              command:
                - sh
                - -c
                - |
                  kubectl rollout restart deployment/komga -n default &&
                  kubectl rollout status deployment/komga -n default --timeout=120s &&
                  kubectl rollout restart deployment/external-gateway -n network
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
