---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: manga-watcher
  namespace: default
spec:
  schedule: "*/20 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: watcher
              image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
              command:
                - "/bin/sh"
                - "-c"
              args:
                - |
                  SRC="/media/downloads/suwayomi/mangas"
                  DEST="/media/manga"
                  STAMP="/media/downloads/suwayomi/.watcher_stamp"

                  echo "[*] Scanning for new chapters..."

                  if [ -f "$STAMP" ]; then
                    FILES=$(find "$SRC" -mindepth 3 -maxdepth 4 -name '*.cbz' -newer "$STAMP")
                  else
                    echo "[*] First run — processing all files"
                    FILES=$(find "$SRC" -mindepth 3 -maxdepth 4 -name '*.cbz')
                  fi

                  if [ -n "$FILES" ]; then
                    echo "$FILES" | while IFS= read -r filepath; do
                      title="$(basename "$(dirname "$filepath")")"
                      chapter="$(basename "$filepath")"
                      dest_dir="$DEST/$title"
                      mkdir -p "$dest_dir"
                      ln -f "$filepath" "$dest_dir/$chapter"
                      echo "[*] Linked: $title/$chapter"
                    done
                    touch "$STAMP"
                    echo "[*] Triggering Komga library scan..."
                    wget --post-data="" \
                      --header="X-API-Key: $KOMGA_API_KEY" \
                      "http://komga.default.svc.cluster.local/api/v1/libraries/0Q7FWJ7XXAPEC/scan" \
                      -q -O /dev/null \
                      && echo "[*] Scan triggered." \
                      || echo "[!] Scan trigger failed."
                  else
                    touch "$STAMP"
                    echo "[*] No new chapters found."
                  fi
                  echo "[*] Done."
              env:
                - name: KOMGA_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: komga
                      key: KOMGA_API_KEY
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - "ALL"
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: media
                  mountPath: /media
          volumes:
            - name: media
              nfs:
                server: 10.10.99.100
                path: /mnt/atlas/media
