---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: manga-watcher
  namespace: default
spec:
  schedule: "*/20 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: watcher
              image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
              command:
                - "/bin/sh"
                - "-c"
              args:
                - |
                  komga_scan() {
                    wget --post-data="" \
                      --header="X-API-Key: $KOMGA_API_KEY" \
                      "http://komga.default.svc.cluster.local/api/v1/libraries/$1/scan" \
                      -q -O /dev/null \
                      && echo "[*] Scan triggered for library $1" \
                      || echo "[!] Scan trigger failed for library $1"
                  }

                  kai_process() {
                    STAMP="$1"
                    SRC="$2"
                    DEST="$3"
                    LIB="$4"
                    LABEL="$5"
                    echo "[*] Scanning Kaizoku $LABEL..."
                    if [ -f "$STAMP" ]; then
                      FILES=$(find "$SRC" -mindepth 2 -maxdepth 2 -name '*.cbz' -newer "$STAMP" 2>/dev/null)
                    else
                      echo "[*] First run for $LABEL — processing all files"
                      FILES=$(find "$SRC" -mindepth 2 -maxdepth 2 -name '*.cbz' 2>/dev/null)
                    fi
                    if [ -n "$FILES" ]; then
                      echo "$FILES" | while IFS= read -r filepath; do
                        series="$(basename "$(dirname "$filepath")")"
                        base="$(basename "$filepath" .cbz)"
                        chapnum=$(echo "$base" | grep -oE '[0-9]+(\.[0-9]+)?$' | sed 's/^0*//')
                        if [ -z "$chapnum" ]; then
                          echo "[!] Could not extract chapter number from: $base — skipping"
                          continue
                        fi
                        mkdir -p "$DEST/$series"
                        ln -f "$filepath" "$DEST/$series/Chapter $chapnum.cbz"
                        echo "[*] Linked: $series/Chapter $chapnum.cbz"
                      done
                      touch "$STAMP"
                      komga_scan "$LIB"
                    else
                      touch "$STAMP"
                      echo "[*] No new $LABEL chapters."
                    fi
                  }

                  kai_process \
                    /media/downloads/kaizoku/.watcher_stamp_manga \
                    /media/downloads/kaizoku/Manga \
                    /media/manga \
                    0Q7FWJ7XXAPEC \
                    manga
                  kai_process \
                    /media/downloads/kaizoku/.watcher_stamp_manhwa \
                    /media/downloads/kaizoku/Manhwa \
                    /media/manhwa \
                    0QGGQTW99MDZB \
                    manhwa
                  kai_process \
                    /media/downloads/kaizoku/.watcher_stamp_comic \
                    /media/downloads/kaizoku/Comic \
                    /media/comics \
                    0QGGW20SXM5Q3 \
                    comic

                  echo "[*] Done."
              env:
                - name: KOMGA_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: komga
                      key: KOMGA_API_KEY
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - "ALL"
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: media
                  mountPath: /media
          volumes:
            - name: media
              nfs:
                server: 10.10.99.100
                path: /mnt/atlas/media
