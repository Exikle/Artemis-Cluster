---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-database
spec:
  chartRef:
    kind: OCIRepository
    name: immich-database
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999

    controllers:
      postgres:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: data
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 20Gi
              globalMounts:
                - path: /var/lib/postgresql/data
                  subPath: pgdata
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
            env:
              PGDATA: /var/lib/postgresql/data/pgdata
              POSTGRES_DB: immich
              POSTGRES_USER: immich
            envFrom:
              - secretRef:
                  name: immich
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pg_isready
                      - -U
                      - immich
                      - -d
                      - immich
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pg_isready
                      - -U
                      - immich
                      - -d
                      - immich
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

      redis:
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: 9-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 6379
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 6379
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

    persistence:
      postgres-etc:
        type: emptyDir
        advancedMounts:
          postgres:
            app:
              - path: /etc/postgresql
                subPath: etc
      postgres-run:
        type: emptyDir
        advancedMounts:
          postgres:
            app:
              - path: /var/run/postgresql
                subPath: run
      postgres-shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
        advancedMounts:
          postgres:
            app:
              - path: /dev/shm
      postgres-tmp:
        type: emptyDir
        advancedMounts:
          postgres:
            app:
              - path: /tmp
                subPath: tmp
      redis-tmp:
        type: emptyDir
        advancedMounts:
          redis:
            app:
              - path: /tmp
                subPath: tmp

    service:
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
