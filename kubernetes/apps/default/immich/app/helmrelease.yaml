---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  values:
    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              TZ: America/Toronto
              IMMICH_WORKERS_INCLUDE: api
              DB_HOSTNAME: immich-database-postgres.default.svc.cluster.local
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich
              REDIS_HOSTNAME: immich-database-redis.default.svc.cluster.local
              IMMICH_MACHINE_LEARNING_URL: http://immich-ml-app.default.svc.cluster.local:3003
              IMMICH_CONFIG_FILE: /config/immich.json
            envFrom:
              - secretRef:
                  name: immich
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      server:
        controller: server
        ports:
          http:
            port: 2283

    route:
      app:
        hostnames:
          - photos.dcunha.io
        parentRefs:
          - name: external-gateway
            namespace: network
          - name: internal-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: immich-server
                port: 2283

    persistence:
      library:
        type: nfs
        server: 10.10.99.100
        path: /mnt/atlas/media/photos
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/upload
      config:
        type: secret
        name: immich
        advancedMounts:
          server:
            app:
              - path: /config/immich.json
                subPath: immich.json
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          server:
            app:
              - path: /tmp
