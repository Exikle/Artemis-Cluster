---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
            env:
              DB_DATABASE_NAME: immich
              DB_HOSTNAME: immich-database-postgres.default.svc.cluster.local
              DB_USERNAME: immich
              IMMICH_CONFIG_FILE: /config/immich.json
              IMMICH_MACHINE_LEARNING_URL: http://immich-ml.default.svc.cluster.local:3003
              IMMICH_WORKERS_INCLUDE: api
              REDIS_HOSTNAME: immich-database-redis.default.svc.cluster.local
            envFrom:
              - secretRef:
                  name: immich
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

    persistence:
      library:
        type: nfs
        path: /mnt/atlas/media/photos
        server: 10.10.99.100
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/upload
      config:
        type: secret
        name: immich
        advancedMounts:
          server:
            app:
              - path: /config/immich.json
                subPath: immich.json
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          server:
            app:
              - path: /tmp
                subPath: tmp

    route:
      app:
        hostnames:
          - photos.dcunha.io
        parentRefs:
          - name: external-gateway
            namespace: network
        rules:
          - backendRefs:
              - name: immich
                port: 2283

    service:
      server:
        controller: server
        ports:
          http:
            port: 2283
