---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-unifi
spec:
  chartRef:
    kind: OCIRepository
    name: external-dns-unifi
  interval: 1h
  values:
    fullnameOverride: external-dns-unifi
    logLevel: info
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/kashalls/external-dns-unifi-webhook
          tag: v0.8.2
        env:
          - name: UNIFI_HOST
            value: "https://10.10.99.1"
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: &secret unifi
                key: UNIFI_API_KEY
          - name: LOG_LEVEL
            value: "info"
        livenessProbe: &probe
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe: *probe
    extraArgs:
      - --webhook-provider-url=http://localhost:8080
      - --gateway-name=internal-gateway
      - --gateway-namespace=network
      - --events
    sources:
      - gateway-httproute
      - service
    domainFilters:
      - dcunha.io
    policy: sync
    txtOwnerId: k8s-internal
    txtPrefix: k8s.
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
