---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-unifi
spec:
  chartRef:
    kind: OCIRepository
    name: external-dns-unifi
  interval: 1h
  values:
    fullnameOverride: external-dns-unifi
    logLevel: info
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/home-operations/external-dns-unifi-webhook
          tag: 0.10.5@sha256:541ae465c2c06de867dfddb5446b1006556adda9e00307af556aa8c41f11dc1d
        env:
          - name: UNIFI_HOST
            value: "https://10.10.99.1"
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: &secret unifi
                key: UNIFI_API_KEY
          - name: LOG_LEVEL
            value: "info"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
    sources:
      - gateway-httproute
      - service
    domainFilters:
      - dcunha.io
    policy: sync
    txtOwnerId: k8s-internal
    triggerLoopOnEvent: true
    txtPrefix: "k8s.internal.%{record_type}-"
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
