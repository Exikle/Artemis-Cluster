endpoint: "https://registry.dcunha.io"
accountDomain: "dcunha.io"
listen: ":5000"
dataDir: "/data"
logLevel: debug
logFormat: json

database:
  driver: postgres

peering:
  healthCheckInterval: 30s
  fetchTimeout: 60s

limits:
  maxBlobSize: 5368709120 # 5 GiB

gc:
  untaggedManifestAge: 1h
  orphanBatchSize: 10000
  interval: 30m
  diskUsageThreshold: 80
  diskUsageCheckInterval: 5m
  retention:
    maxAge: 168h
    pinnedGlobs:
      - "v*"
      - "*.*.*"

metrics:
  enabled: true
  listen: ":9090"

federation:
  autoAccept: mutual

upstreams:
  enabled: true
  registries:
    - name: docker.io
      endpoint: "https://registry-1.docker.io"
    - name: ghcr.io
      endpoint: "https://ghcr.io"

ui:
  enabled: true
