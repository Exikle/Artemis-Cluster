---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
spec:
  chartRef:
    kind: OCIRepository
    name: oauth2-proxy
  interval: 1h
  values:
    controllers:
      oauth2-proxy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.8.2
            env:
              OAUTH2_PROXY_PROVIDER: oidc
              OAUTH2_PROXY_OIDC_ISSUER_URL: "https://auth.dcunha.io"
              OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
              OAUTH2_PROXY_REDIRECT_URL: "https://oauth.dcunha.io/oauth2/callback"
              OAUTH2_PROXY_UPSTREAM: "static://200"
              OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
              OAUTH2_PROXY_EMAIL_DOMAINS: "*"
              OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
              OAUTH2_PROXY_COOKIE_DOMAINS: ".dcunha.io"
              OAUTH2_PROXY_WHITELIST_DOMAINS: ".dcunha.io"
              OAUTH2_PROXY_COOKIE_SECURE: "true"
              OAUTH2_PROXY_COOKIE_SAMESITE: lax
              OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy
              OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
              OAUTH2_PROXY_REVERSE_PROXY: "true"
              OAUTH2_PROXY_SCOPE: "openid profile email"
            envFrom:
              - secretRef:
                  name: oauth2-proxy
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 4180
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "oauth.dcunha.io"
        parentRefs:
          - name: internal-gateway
            namespace: network
