---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lldap
spec:
  chartRef:
    kind: OCIRepository
    name: lldap
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      lldap:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lldap/lldap
              tag: 2026-05-05-alpine-rootless@sha256:dd3c2fe9145b5c8301a6bda676266109414528b98e7bc45c25ab85c26c228fbd
            env:
              LLDAP_LDAP_BASE_DN: dc=dcunha,dc=io
            envFrom:
              - secretRef:
                  name: lldap
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    persistence:
      data:
        existingClaim: lldap
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        advancedMounts:
          lldap:
            app:
              - path: /tmp
                subPath: tmp
    route:
      app:
        hostnames:
          - lldap.dcunha.io
        parentRefs:
          - name: internal-gateway
            namespace: network
    service:
      app:
        ports:
          http:
            port: 17170
          ldap:
            port: 3890
