---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: unifi
  labels:
    kubernetes.io/service-name: unifi
addressType: IPv4
endpoints:
  - addresses:
      - 10.10.99.4
    conditions:
      ready: true
      serving: true
      terminating: false
ports:
  - name: https
    port: 443
    protocol: TCP
    appProtocol: https
