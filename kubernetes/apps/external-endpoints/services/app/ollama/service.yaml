apiVersion: v1
kind: Service
metadata:
  name: &app ollama
  annotations:
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |-
      url: "https://ollama.dcunha.io"
      group: homelab
      interval: 1m
      ui:
        hide-hostname: true
        hide-url: true
      conditions:
        - "[STATUS] == 200"
spec:
  clusterIP: None
  ports:
    - name: http
      port: 11434
      protocol: TCP
      targetPort: 11434
      appProtocol: http
