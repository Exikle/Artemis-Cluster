# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      repo: forgejo://git.dcunha.io/exikle/Artemis-Cluster
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.dcunha.io
      mcp: true
    secret:
      existingSecret: konflate-webhook-token-secret
    httpRoute:
      enabled: true
      hostnames:
        - konflate.dcunha.io
      parentRefs:
        - name: internal-gateway
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 2Gi
