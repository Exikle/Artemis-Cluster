---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  chart:
    spec:
      chart: ceph-csi-drivers
      version: "1.0.1"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
  interval: 1h
  values:
    cephConnections: []
    clientProfiles: []
    drivers:
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        controllerPlugin:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: rook-ceph.cephfs.csi.ceph.com-ctrlplugin
                  topologyKey: kubernetes.io/hostname
          replicas: 2
          tolerations: []
      nfs:
        enabled: false
      nvmeof:
        enabled: false
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        controllerPlugin:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: rook-ceph.rbd.csi.ceph.com-ctrlplugin
                  topologyKey: kubernetes.io/hostname
          replicas: 2
          tolerations: []
        snapshotPolicy: volumeSnapshot
    operatorConfig:
      driverSpecDefaults:
        controllerPlugin:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
          replicas: 2
          tolerations: []
        kernelMountOptions:
          ms_mode: prefer-crc
        nodePlugin:
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists
