---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  values:
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: true
    route:
      dashboard:
        parentRefs:
          - name: internal-gateway
            namespace: network
        host:
          name: rook.dcunha.io
          path: /
          pathType: PathPrefix
    cephClusterSpec:
      cephConfig:
        global:
          bdev_async_discard_threads: "1"
          bdev_enable_discard: "true"
          osd_class_update_on_start: "false"
          osd_memory_target: "3221225472"
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      crashCollector:
        disable: false
      csi:
        readAffinity:
          enabled: true
      dashboard:
        enabled: true
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090
        ssl: false
        urlPrefix: /
      mgr:
        modules:
          - name: diskprediction_local
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      mon:
        allowMultiplePerNode: false
        count: 3
      network:
        addressRanges:
          cluster:
            - 10.10.99.0/24
          public:
            - 10.10.99.0/24
        connections:
          requireMsgr2: true
        provider: host

      # FIX: The placement block has been corrected to follow the schema [web:804, web:813]
      placement:
        mgr: &placement
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - talos-cp-01
                        - talos-cp-02
                        - talos-cp-03
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists
        mon: *placement

      resources:
        mgr:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 512Mi
        mon:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 1Gi
        osd:
          limits:
            memory: 8Gi
          requests:
            cpu: 500m
            memory: 2Gi
      storage:
        config:
          osdsPerDevice: "1"
        devicePathFilter: ^/dev/disk/by-id/nvme-SAMSUNG_MZVLW256HEHP.*
        nodes:
          - name: talos-cp-01
          - name: talos-cp-02
          - name: talos-cp-03
        useAllDevices: false
        useAllNodes: false

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          allowVolumeExpansion: true
          enabled: true
          isDefault: true
          mountOptions:
            - discard
          name: ceph-block
          parameters:
            compression_algorithm: zstd
            compression_mode: aggressive
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            imageFormat: "2"
          reclaimPolicy: Delete
          volumeBindingMode: Immediate

    cephBlockPoolsVolumeSnapshotClass:
      deletionPolicy: Delete
      enabled: true
      isDefault: false
      name: csi-ceph-blockpool

    cephFileSystemVolumeSnapshotClass:
      deletionPolicy: Delete
      enabled: true
      isDefault: false
      name: csi-ceph-filesystem

    cephFileSystems:
      - name: &cephFileSystemName ceph-filesystem
        spec:
          dataPools:
            - failureDomain: host
              name: data0
              replicated:
                size: 3
          metadataPool:
            replicated:
              size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
            placement:
              topologySpreadConstraints:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: *cephFileSystemName
                  maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
            priorityClassName: system-cluster-critical
            resources:
              limits:
                memory: 4Gi
              requests:
                cpu: 100m
                memory: 1Gi
        storageClass:
          allowVolumeExpansion: true
          enabled: true
          isDefault: false
          name: ceph-filesystem
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          pool: data0
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
