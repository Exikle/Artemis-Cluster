---
# Binds ToolHive's auto-created ServiceAccount (same name as MCPServer) to the ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s
subjects:
  - kind: ServiceAccount
    name: mcp-k8s
    namespace: ai
