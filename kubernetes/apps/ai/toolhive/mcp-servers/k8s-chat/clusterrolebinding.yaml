---
# Binds the "k8s" MCPServer's ServiceAccount to the existing mcp-k8s ClusterRole.
# ToolHive creates the SA as "{name}-sa" = "k8s-sa".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-mcp-chat
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s
subjects:
  - kind: ServiceAccount
    name: k8s-sa
    namespace: ai
