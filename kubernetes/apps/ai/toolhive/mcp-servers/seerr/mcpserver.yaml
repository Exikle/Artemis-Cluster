---
# Source: https://www.npmjs.com/package/@jhomen368/overseerr-mcp
# Package: @jhomen368/overseerr-mcp (npm) — Jellyseerr media requests
# Auth: API key via ExternalSecret seerr-mcp (1Password item: seerr)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-seerr
spec:
  groupRef:
    name: artemis-media
  image: node:24-alpine
  transport: stdio
  proxyPort: 8080
  env:
    - name: SEERR_HOST
      value: http://seerr.media.svc.cluster.local
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          command:
            - "npx"
            - "-y"
            - "@jhomen368/overseerr-mcp"
          envFrom:
            - secretRef:
                name: seerr-mcp
          volumeMounts:
            - mountPath: /tmp
              name: tmp
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
