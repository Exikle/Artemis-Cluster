---
# Source: https://github.com/voska/hass-mcp
# Image: docker.io/voska/hass-mcp (published to Docker Hub via docker.yml workflow)
# Transport: stdio (standard MCP stdio protocol)
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-ha
spec:
  groupRef:
    name: artemis
  image: docker.io/voska/hass-mcp:latest
  transport: stdio
  proxyPort: 8080
  secrets:
    - name: ha-mcp
      key: HA_TOKEN
      targetEnvName: HA_TOKEN
  env:
    - name: HA_URL
      value: http://home-assistant.home-automation.svc.cluster.local:8123
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi
