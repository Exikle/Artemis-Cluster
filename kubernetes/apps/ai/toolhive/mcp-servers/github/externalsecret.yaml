---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# 1Password item: "github-mcp" in kubernetes vault
# Required field: GITHUB_PERSONAL_ACCESS_TOKEN (GitHub PAT with repo/read permissions)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretname github-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *secretname
    template:
      engineVersion: v2
      data:
        GITHUB_PERSONAL_ACCESS_TOKEN: "{{ .GITHUB_PAT }}"
  dataFrom:
    - extract:
        key: github
