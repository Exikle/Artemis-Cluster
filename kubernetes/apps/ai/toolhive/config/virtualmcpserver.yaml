---
# General gateway — safe for any AI session (Open WebUI default, n8n)
# URL: http://vmcp-artemis-general.ai.svc.cluster.local:4483
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: artemis-general
spec:
  groupRef:
    name: artemis-general
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
    operational:
      failureHandling:
        healthCheckInterval: 30s
  incomingAuth:
    type: anonymous
    authzConfig:
      type: inline
      inline:
        policies:
          - 'permit(principal, action, resource);'
  outgoingAuth:
    source: discovered

