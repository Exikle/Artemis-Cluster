---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      n8n:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/n8n-io/n8n
              tag: 2.18.4 # https://github.com/n8n-io/n8n/releases

            env:
              GENERIC_TIMEZONE: "America/Toronto"
              N8N_PROTOCOL: "https"
              N8N_HOST: "n8n.dcunha.io"
              N8N_PORT: &port 5678
              N8N_LOG_LEVEL: "info"
              N8N_LOG_OUTPUT: "console"
              N8N_RUNNERS_ENABLED: "true"
              EXECUTIONS_DATA_PRUNE: "true"
              EXECUTIONS_DATA_MAX_AGE: "7"
              EXECUTIONS_DATA_PRUNE_MAX_COUNT: "50000"
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
              WEBHOOK_URL: "https://n8n-webhook.dcunha.io"
            envFrom:
              - secretRef:
                  name: n8n
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "n8n.dcunha.io"
        parentRefs:
          - name: internal-gateway
            namespace: network
      webhook:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "n8n-webhook.dcunha.io"
        parentRefs:
          - name: external-gateway
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /webhook
            backendRefs:
              - name: n8n
                port: *port
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /home/node/.n8n
