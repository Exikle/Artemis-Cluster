colors = false

[pre-commit]
parallel = true

[[pre-commit.jobs]]
name = "format-go"
glob = ["*.go"]
run = "gofmt -s -w {staged_files}"
stage_fixed = true

[[pre-commit.jobs]]
name = "format-just"
glob = ["*.just", ".justfile"]
run = "for f in {staged_files}; do just --justfile $f --fmt; done"
stage_fixed = true

[[pre-commit.jobs]]
name = "format-mise"
glob = [".mise.toml"]
run = "mise fmt"
stage_fixed = true

[[pre-commit.jobs]]
name = "oxfmt"
glob = ["*.yml", "*.yaml", "*.json", "*.json5", "*.jsonc", "*.md", "*.markdown"]
run = "mise exec -- oxfmt {staged_files}"
stage_fixed = true

[[pre-commit.jobs]]
name = "mise-lock"
glob = [".mise.toml"]
run = "mise lock && { [ -f mise.lock ] && git add mise.lock || true; }"

[[pre-commit.jobs]]
name = "shellcheck"
glob = ["*.sh"]
run = "shellcheck {staged_files}"

[[pre-commit.jobs]]
name = "zizmor"
glob = [".github/workflows/*.yaml", ".github/actions/**/action.yaml"]
run = "zizmor --offline {staged_files}"

[[pre-commit.jobs]]
name = "zizmor-forgejo"
glob = [".forgejo/workflows/*.yaml", ".forgejo/workflows/*.yml"]
run = "zizmor --offline {staged_files}"
